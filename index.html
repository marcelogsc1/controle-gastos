<!DOCTYPE html>
<html lang="pt-BR">
<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Controle de Gastos</title>
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gastos">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fa;--srf:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --bd:#e8ecf2;--bd2:#cbd5e1;
  --txt:#0d1117;--mt:#64748b;--mt2:#94a3b8;
  --grn:#22c55e;--grn-l:#f0fdf4;--grn-d:#16a34a;
  --blu:#2563eb;--blu-l:#eff6ff;--blu-d:#1d4ed8;
  --red:#ef4444;--red-l:#fef2f2;
  --amb:#f59e0b;--amb-l:#fffbeb;
  --pur:#8b5cf6;--pur-l:#f5f3ff;
  --accent:#38bdf8;
  --dk-bg:linear-gradient(160deg,#17304d 0%,#0d1e30 35%,#080f1c 100%);
  --dk-card:rgba(255,255,255,0.06);
  --dk-border:rgba(255,255,255,0.08);
  --dk-txt:#f1f5f9;
  --dk-muted:rgba(255,255,255,0.35);
  --dk-dim:rgba(255,255,255,0.22);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.04);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--mt2); }

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
input,button,textarea{font-family:inherit}

@keyframes modalIn{from{opacity:0;transform:scale(0.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes slideUpSheet{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* Estrutura Base (Mobile First) */
#app{max-width:600px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.hdr{position:sticky;top:0;background:var(--dk-bg);border-bottom:1px solid var(--dk-border);z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.htop{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0;position:relative}
.htop::after{content:'';position:absolute;top:0;left:0;right:0;height:80px;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,.12) 0%,transparent 70%);pointer-events:none}
.atitle{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-muted)}
.htop-r{display:flex;align-items:center;gap:8px}
.bdg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.cfg-btn{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:12px;color:var(--dk-muted);transition:background 0.2s;display:flex;align-items:center;gap:4px}
.cfg-btn:hover{background:rgba(255,255,255,.1)}
.mnav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.mb{background:var(--dk-card);border:1px solid var(--dk-border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--dk-muted);transition:all 0.2s}
.mb:hover{background:rgba(255,255,255,.12);color:var(--dk-txt)}
.mlbl{font-size:17px;font-weight:800;text-transform:capitalize;letter-spacing:-0.03em;color:var(--dk-txt)}

/* Cards do Topo */
.tetos{
  display:flex;
  gap:10px;
  padding:0 16px 14px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.tetos::-webkit-scrollbar{display:none}
.tc{
  flex:0 0 calc(85% - 12px);
  max-width:320px;
  scroll-snap-align:center;
  background:var(--dk-card);
  border:1px solid var(--dk-border);
  border-radius:12px;
  padding:12px 14px;
  transition:transform 0.15s;
}
.tc:active{transform:scale(0.97);}
.tclbl{font-size:9px;font-weight:700;color:var(--dk-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tcsp{font-family:'DM Mono',monospace;font-size:13px;font-weight:400}
.tclim{font-family:'DM Mono',monospace;font-size:10px;color:var(--dk-dim)}
.tbar{height:4px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden}
.tfill{height:100%;border-radius:99px;transition:width .4s ease}
.trest{font-size:10px;font-family:'DM Mono',monospace;margin-top:5px;text-align:right}

.tabs{display:flex;border-top:1px solid var(--dk-border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:75px;padding:12px 4px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);border-bottom:2px solid transparent;letter-spacing:.04em;text-transform:uppercase;text-align:center;transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:rgba(255,255,255,0.75)}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.ct{padding:16px 16px 90px;flex:1;width:100%;min-width:0;animation:fadeIn 0.18s ease-out}
.card{background:var(--srf);border:none;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);min-width:0;max-width:100%}

.sec-line{flex:1;height:1px;background:var(--bd);margin-left:8px}

/* Goal bars */
.goal-card{background:var(--srf);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow-sm)}
.goal-bar-bg{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:8px}
.goal-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}

/* Due day badge */
.due-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;background:#fef3c7;color:#92400e;display:inline-flex;align-items:center;gap:3px}
.due-badge.urgent{background:#fee2e2;color:#991b1b}
.due-badge.ok{background:#f0fdf4;color:#166534}

/* Section header with action button */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px}
.sec-hdr-lbl{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.sec-hdr-btn{font-size:12px;font-weight:600;color:var(--blu);background:none;border:none;cursor:pointer;padding:0}

/* Tab with icon */
.tab-ico{display:block;font-size:14px;margin-bottom:2px}

/* Export button */
.btn-export{background:var(--s2);color:var(--txt);border:1px solid var(--bd);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background 0.2s}
.btn-export:hover{background:var(--bd)}

/* Upcoming bills */
.bill-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.bill-row:last-child{border-bottom:none}
.bill-name{font-size:13px;font-weight:500}
.bill-day{font-family:monospace;font-size:12px;font-weight:700}
.bill-amt{font-family:monospace;font-size:13px;font-weight:700}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--srf);border:none;border-radius:14px;padding:16px 18px;box-shadow:var(--shadow-sm);transition:box-shadow 0.2s}
.sc:hover{box-shadow:var(--shadow-md)}
.sl{font-size:11px;font-weight:600;color:var(--mt);margin-bottom:6px}
.sv{font-family:'DM Mono',monospace;font-size:18px;font-weight:400;letter-spacing:-0.02em}
.ss{font-size:11px;color:var(--mt2);margin-top:4px}

/* Grids Dinâmicos (Para substituir Layouts Engessados) */
.cards-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 12px; align-items: start; width: 100%; }
.dash-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 24px; }

/* Categorias Clicáveis */
.gr{display:flex;align-items:flex-start;padding:12px 10px;border-bottom:1px solid var(--bd);margin:0 -10px;border-radius:8px;transition:background 0.2s}
.gr.clickable{cursor:pointer}
.gr.clickable:hover{background:var(--s2)}
.gr:last-child{border-bottom:none}
.grl{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
.gri{flex:1;min-width:0}
.grn{font-size:13px;font-weight:600;color:var(--txt)}
.grc{font-size:11px;color:var(--mt);margin-top:2px}
.grr{text-align:right;flex-shrink:0}
.gra{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.gbr{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:8px}
.gbf{height:100%;border-radius:2px;transition:width 0.4s ease}

.sec{font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;display:flex;align-items:center;gap:6px;justify-content:space-between;}

/* Formulários e Inputs */
.qe{background:var(--srf);border:1px solid var(--bd);border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.qer{display:flex;padding:4px}
.qei{flex:1;border:none;padding:12px 14px;font-size:16px;background:transparent;color:var(--txt);outline:none}
.qes{background:var(--grn);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:transform 0.1s}
.qes:active{transform:scale(0.96)}
.qeh{padding:6px 14px 12px;font-size:12px;color:var(--mt2);line-height:1.5}
.qep{background:var(--grn-l);border-top:1px solid #86efac;padding:14px}
.qept{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.qepa{font-family:monospace;font-size:20px;font-weight:700;color:var(--grn-d)}
.qepdate{font-size:12px;color:var(--mt);font-weight:500; background:var(--srf); padding:4px 8px; border-radius:6px; border:1px solid #bbf7d0}
.qepdesc{font-size:15px;font-weight:500;margin-bottom:12px}
.gsel{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.gsb{padding:6px 12px;border-radius:8px;border:1px solid var(--bd);font-size:12px;font-weight:500;cursor:pointer;background:var(--srf);color:var(--mt);display:flex;align-items:center;gap:6px;transition:all 0.2s}
.gsb.on{color:#fff;border-color:transparent;font-weight:600}
.qebtns{display:flex;gap:8px}
.qeok{background:var(--grn);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer}
.qeno{background:var(--srf);color:var(--mt);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-weight:500}

.dhdr{font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;padding:16px 0 6px;border-bottom:1px solid var(--bd)}
.er{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd)}
.er:last-of-type{border-bottom:none}
.erm{flex:1;min-width:0}
.erd{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.ers{font-size:12px;color:var(--mt);margin-top:2px}
.err{text-align:right;flex-shrink:0}
.era{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.eacts{display:flex;gap:6px;margin-top:6px;justify-content:flex-end}
.bs{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;border:none;font-weight:600;transition:opacity 0.2s}
.bs:hover{opacity:0.8}
.be{background:var(--blu-l);color:var(--blu)}
.bdl{background:var(--s2);color:var(--mt);border:1px solid var(--bd)!important}
.bco{background:var(--red-l);color:var(--red)}
.bca{background:var(--s2);color:var(--mt)}

.pi{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bd)}
.pi:last-child{border-bottom:none}
.pin{flex:1;font-size:14px;font-weight:500}
.pia{font-family:'DM Mono',sans-serif;font-size:14px;font-weight:500;cursor:pointer;color:var(--blu);border-bottom:2px solid var(--bd);padding-bottom:1px;transition:border-color 0.2s,transform 0.1s}
.pia:hover{border-bottom-color:var(--blu);transform:scale(1.02)}
.pitag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px}

.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;-webkit-overflow-scrolling:touch; align-items:center}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);cursor:pointer;font-size:12px;font-weight:600;background:var(--srf);color:var(--mt);white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.chip.on{color:#fff;border-color:transparent}

/* Import Styles */
.btn-import{background:var(--s2); color:var(--txt); border:1px solid var(--bd); padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; flex-shrink:0; transition:background 0.2s;}
.btn-import:hover{background:var(--bd);}
.import-area{width:100%; height:120px; padding:12px; border:1px dashed var(--mt2); border-radius:8px; font-family:monospace; font-size:12px; margin-bottom:12px; resize:vertical; background:var(--srf); color:var(--txt);}
.import-area:focus{outline:none; border-color:var(--blu); background:var(--blu-l);}
.tbl-wrap{overflow-x:auto; border-radius:8px; border:1px solid var(--bd); margin-bottom:16px;}
.itbl{width:100%; border-collapse:collapse; font-size:12px; text-align:left;}
.itbl th{background:var(--s2); padding:10px; font-weight:600; color:var(--mt); border-bottom:1px solid var(--bd);}
.itbl td{padding:10px; border-bottom:1px solid var(--bd); color:var(--txt);}
.itbl tr:last-child td{border-bottom:none;}
.itbl td.td-amt{font-family:monospace; font-weight:700;}

.trow{display:flex;justify-content:space-between;padding:16px 0 0;border-top:1px solid var(--bd2);margin-top:8px}
.tlrow{margin-bottom:12px}
.tlhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.tln{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.tla{font-family:'DM Mono',monospace;font-size:14px;font-weight:600;white-space:nowrap}
.tlmonths{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;-webkit-overflow-scrolling:touch;width:100%}
.tlmonths::-webkit-scrollbar{display:none}
.tm{font-size:10px;font-weight:600;padding:5px 8px;border-radius:6px;white-space:nowrap;min-width:40px;text-align:center;border:1px solid transparent}
.tm-past{background:var(--s3);color:var(--mt2);border-color:var(--bd)}
.tm-cur{color:#fff}
.tm-fut{color:#fff;opacity:.75}
.tm-off{background:transparent;color:var(--bd2);border:1px solid var(--bd)}
.tlnote{font-size:12px;color:var(--mt);margin-top:5px;line-height:1.4}

.fs{padding:20px 16px 80px;max-width:600px;margin:0 auto;width:100%;min-width:0;animation:modalIn 0.2s ease}
.fhdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:24px}
.fbk{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mt);white-space:nowrap;flex-shrink:0;transition:background 0.2s}
.fbk:hover{background:var(--bd)}
.ftit{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.fsub{font-size:13px;color:var(--mt);margin-top:2px;text-transform:capitalize}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--mt);margin-bottom:6px;letter-spacing:.02em}
.fi{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:10px;font-size:15px;background:var(--srf);color:var(--txt);transition:border-color 0.2s}
.fi:focus{outline:none;border-color:var(--blu);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tb{padding:8px 14px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-size:13px;font-weight:500;background:var(--srf);color:var(--mt);transition:all .15s;display:flex;align-items:center;gap:6px}
.tb.on{color:#fff;border-color:transparent;font-weight:600}

.bgrn{width:100%;padding:14px;background:var(--grn);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.bblu{width:100%;padding:14px;background:var(--blu);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.2s}
.bgrn:hover, .bblu:hover{opacity:0.9}
.bgh{width:100%;padding:12px;background:transparent;color:var(--mt);border:1px solid var(--bd);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;transition:background 0.2s}
.bgh:hover{background:var(--s2)}
.bred{width:100%;padding:12px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;transition:background 0.2s}
.bred:hover{background:var(--red-l)}

.cfgr{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd)}
.cfgr:last-child{border-bottom:none}
.cfgl{flex:1}
.cfgn{font-size:14px;font-weight:500}
.cfgs{font-size:12px;color:var(--mt);margin-top:4px}
.cfgi{border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-family:monospace;font-weight:700;font-size:14px;text-align:right;width:130px;background:var(--srf);color:var(--txt)}
.cfgi:focus{outline:none;border-color:var(--blu)}

.notice{background:var(--blu-l);border:1px solid #bfdbfe;border-radius:10px;padding:12px 16px;font-size:13px;color:var(--blu-d);margin-bottom:16px;line-height:1.5}
.empty{text-align:center;padding:48px 16px;color:var(--mt)}
.fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:300px;z-index:90}
.fabn{width:100%;padding:16px;background:var(--txt);color:#fff;border:none;border-radius:100px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(15,23,42,.25);transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s;font-family:'Plus Jakarta Sans',sans-serif}
.fabn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 12px 28px rgba(15,23,42,.3)}
.fabn:active{transform:scale(0.96)}

.ch-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:8px;cursor:pointer}
.ch-bar-bg{height:140px;width:100%;background:var(--s2);border-radius:6px;position:relative;display:flex;align-items:flex-end;border:1px solid var(--bd)}
.ch-bar-fill{width:100%;border-radius:5px;transition:height 0.5s ease}
.ch-bar-lbl{font-size:10px;text-transform:uppercase;font-weight:700;color:var(--mt)}

.btn-plus{background:transparent; color:var(--mt); border:none; padding:0 8px; font-size:18px; font-weight:400; cursor:pointer; transition:color 0.2s; display:flex; align-items:center; justify-content:center; line-height:1;}
.btn-plus:hover{color:var(--blu);}

/* ===== Modal de categoria ===== */
@keyframes catModalIn{from{opacity:0;transform:scale(0.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes catSheetIn{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}

const app = initializeApp(firebaseConfig);

onAuthStateChanged(auth, (user) => {
  authChecked = true;
  if (user) {
    userId = user.uid;
    isCloud = true;
    if (unsubscribeSnapshot) unsubscribeSnapshot();
    unsubscribeSnapshot = onSnapshot(doc(db, "users", userId), (docSnap) => {
      if (docSnap.exists()) {

      }

    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }

  }

async function sset(v) {

  }
}

};

window.loginApp = function() {
  const e = document.getElementById('eml').value.trim(); const p = document.getElementById('pwd').value;
  const errEl = document.getElementById('auth-err'); if (errEl) errEl.style.display = 'none';
  if (!e || !p) return showAuthErr('Preencha o e-mail e a senha.');
  signInWithEmailAndPassword(auth, e, p).catch(err => {
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') showAuthErr('E-mail ou senha incorretos.');
    else if (err.code === 'auth/invalid-email') showAuthErr('Formato de e-mail inválido.');
    else if (err.code === 'auth/too-many-requests') showAuthErr('Muitas tentativas falhas. Tente novamente mais tarde.');
    else showAuthErr('Erro ao entrar: ' + err.message);
  });
};

  const errEl = document.getElementById('auth-err'); if (errEl) errEl.style.display = 'none';
  
  if (!e || !p || !cp) return showAuthErr('Preencha todos os campos.');
  if (p.length < 6) return showAuthErr('Sua senha deve ter pelo menos 6 caracteres.');
  if (p !== cp) return showAuthErr('As senhas não coincidem.');

  createUserWithEmailAndPassword(auth, e, p).catch(err => {

function getPlanned(m){
  var ov=D.monthOverrides[m]||{};
  var ex=(D.monthExtras[m]||[]).map(function(e){return Object.assign({},e,{isExtra:true});});
  var items=D.fixedItems
    .filter(function(i){return ov[i.id]&&ov[i.id].active===false?false:true;})
    .map(function(i){return Object.assign({},i,{amount:ov[i.id]&&ov[i.id].amount!==undefined?ov[i.id].amount:i.amount,isFixed:true});});
  var inst=getActiveInstAll(m).map(function(i){return Object.assign({},i,{isParcela:true});});

}

// ── Due date helpers ──────────────────────────────────────────────────────
function dueDaysFromNow(dueDay, m) {
  if(!dueDay) return null;
  var today = new Date();
  var yr = today.getFullYear(), mo = today.getMonth();
  var due = new Date(yr, mo, dueDay);
  if(due < today) due = new Date(yr, mo+1, dueDay);
  return Math.round((due - today)/(1000*60*60*24));
}
function dueBadge(dueDay, m) {
  if(!dueDay) return '';
  var d = dueDaysFromNow(dueDay, m);
  if(d === null) return '';
  var cls = d <= 3 ? 'urgent' : d <= 7 ? 'due-badge' : 'ok';
  var lbl = d === 0 ? 'Vence hoje' : d < 0 ? 'Venceu' : 'Dia '+dueDay;
  return '<span class="due-badge '+cls+'">&#128197; '+lbl+'</span>';
}

// isEst: undefined or true = estimativa, false = invariável
function isEst(item){ return item.isEstimate !== false; }

function stats(m){
  var baseSal = totSal();
  var extraInc = ((D.extraIncome && D.extraIncome[m]) || []).reduce(function(s,e){return s+e.amount;},0);
  var sal = baseSal + extraInc;
  var totalManual = 0;
  var totalCommitted = 0;
  var totalReal = 0;
  var invTotalR = 0;
  var cats = {};

  var plannedAll = getPlanned(m);
  var expsAll = getExp(m);

  GR.forEach(function(g) {
    var planned = plannedAll.filter(function(i){ return i.group === g.id; });

    var pInv = planned.filter(function(i){ return i.isFixed && !isEst(i); })
                      .reduce(function(s,i){return s+i.amount;},0);
    var pEst = planned.filter(function(i){ return !i.isFixed || isEst(i); })
                      .reduce(function(s,i){return s+i.amount;},0);

    if(pInv === 0 && pEst === 0 && D.config.tetos[g.id]) pEst = D.config.tetos[g.id];

    var s = expsAll.filter(function(e){return e.group===g.id;}).reduce(function(acc,e){return acc+e.amount;},0);

    var cCommitted = pInv + Math.max(pEst, s);
    var cReal = pInv + s;

    totalManual    += s;
    totalCommitted += cCommitted;
    totalReal      += cReal;
    invTotalR      += pInv;

    cats[g.id] = { p: pInv+pEst, pInv: pInv, pEst: pEst, s: s, c: cCommitted, real: cReal };
  });

  var expTotal   = expsAll.reduce(function(s,e){return s+e.amount;},0);
  var abated     = (D.instAbatimentos && D.instAbatimentos[m]) || [];
  var activeInst = getActiveInst(m);
  var parcTotalR = activeInst.filter(function(i){return abated.indexOf(i.id)===-1;}).reduce(function(s,i){return s+i.amount;},0);
  var gastoReal  = expTotal + invTotalR + parcTotalR;

  return {
    sal: sal,
    baseSal: baseSal,
    extraInc: extraInc,
    sp: totalManual,
    committed: totalCommitted,
    realSpent: totalReal,
    gastoReal: gastoReal,
    expTotal: expTotal,
    invTotal: invTotalR,
    parcTotal: parcTotalR,
    realSav: sal - totalReal,
    projSav: sal - totalCommitted,
    cats: cats
  };
}

/* =========================================================
   MOTOR DE EXTRAÇÃO LÉXICA (NLP) - SEPARA DATA, VALOR E DESCRIÇÃO
   ========================================================= */
function parseQEtxt(txt){
  if(!txt.trim()) return null;
  let original = txt;
  let dateObj = new Date();
  let dateStr = tod();
  let displayDate = 'Hoje';

  // Extrai marcadores de tempo
  const dateRegex = /\b(hoje|ontem|antes\s+de\s+ontem|anteontem|dia\s+([0-3]?\d)|([0-3]?\d)\/([0-1]?\d)(?:\/\d{2,4})?)\b/i;
  const dateMatch = original.match(dateRegex);

  if (dateMatch) {
    let m = dateMatch[0].toLowerCase();
    if (m === 'ontem') {
      dateObj.setDate(dateObj.getDate() - 1); displayDate = 'Ontem';
    } else if (m === 'anteontem' || m === 'antes de ontem') {
      dateObj.setDate(dateObj.getDate() - 2); displayDate = 'Anteontem';
    } else if (m.startsWith('dia ')) {
      let d = parseInt(m.replace(/\D/g, ''), 10);
      if (d >= 1 && d <= 31) dateObj.setDate(d);
      displayDate = `Dia ${String(d).padStart(2,'0')}`;
    } else if (dateMatch[3] && dateMatch[4]) {
      let d = parseInt(dateMatch[3], 10); let mo = parseInt(dateMatch[4], 10) - 1;
      dateObj.setDate(d); dateObj.setMonth(mo);
      displayDate = `${String(d).padStart(2,'0')}/${String(mo+1).padStart(2,'0')}`;
    }
    dateStr = dateObj.getFullYear() + '-' + String(dateObj.getMonth()+1).padStart(2,'0') + '-' + String(dateObj.getDate()).padStart(2,'0');
    original = original.replace(dateMatch[0], ' ');
  }

  // Extrai o valor monetário
  let amount = 0;
  const amtRegex = /(?:r\$\s*)?(\d{1,3}(?:\.\d{3})*(?:,\d{1,2})?|\d+(?:[.,]\d{1,2})?)/i;
  const amtMatch = original.match(amtRegex);

  if (amtMatch) {
    let amtStr = amtMatch[1].replace(/\./g, '').replace(',', '.');
    amount = parseFloat(amtStr);
    original = original.replace(amtMatch[0], ' ');
  } else {
    return null;
  }

  if(!amount || isNaN(amount)) return null;

  // Categoria automática baseada no restante do texto
  let group = 'outros';
  let low = original.toLowerCase();
  let keys = Object.keys(KW);
  for(let i=0; i<keys.length; i++){
    if(KW[keys[i]].some(w => low.includes(w))){ group = keys[i]; break; }
  }

  let desc = original.replace(/\s+/g, ' ').trim();
  if(!desc) desc = gBy(group).label;
  else desc = desc.charAt(0).toUpperCase() + desc.slice(1);

  return { amount, group, description: desc, date: dateStr, displayDate: displayDate };
}

  // Entradas extras do mês

  var extraBlock = '<div class="sec-hdr" style="margin-top:4px"><div class="sec-hdr-lbl">&#43; Entradas extras do mês</div><button class="sec-hdr-btn" onclick="window.openAddExtraIncome()">+ Adicionar</button></div>'
    +'<div class="card" style="padding:10px 16px 12px">'
    +(extras.length ? extras.map(function(e){
        var isDel = U.del === 'ei-'+e.id;
        return '<div class="er" style="padding:10px 0">'
          +'<div class="erm"><div class="erd">'+e.label+'</div></div>'
          +'<div class="err">'
            +'<div class="era" style="color:var(--grn)">+'+R(e.amount)+'</div>'
            +'<div class="eacts">'+(isDel
              ?'<button class="bs bco" onclick="window.delExtraIncomeDo(\''+e.id+'\')">Confirmar</button><button class="bs bca" onclick="window.delX()">Cancelar</button>'
              :'<button class="bs bdl" onclick="window.delC(\'ei-'+e.id+'\')">Excluir</button>')
            +'</div>'
          +'</div>'
        +'</div>';
      }).join('')
      : '<div style="font-size:13px;color:var(--mt2);padding:8px 0 4px">Nenhuma entrada extra neste mês.</div>')
    +'</div>';

  // Upcoming bills (next 7 days, allowing up to 5 days overdue)
  var upcomingItems = (D.fixedItems||[]).filter(function(i){ return i.dueDay; }).map(function(i){
    var d = dueDaysFromNow(i.dueDay, m);
    return Object.assign({},i,{daysLeft:d});
  }).filter(function(i){ return i.daysLeft !== null && i.daysLeft >= -5 && i.daysLeft <= 7; })
    .sort(function(a,b){ return a.daysLeft - b.daysLeft; });

  var billsBlock = '';
  if(upcomingItems.length) {
    var billRows = upcomingItems.map(function(i){
      var g = gBy(i.group);
      var urgClr = i.daysLeft < 0 ? 'var(--red)' : i.daysLeft <= 2 ? 'var(--red)' : i.daysLeft <= 4 ? 'var(--amb)' : 'var(--mt)';
      var dayLbl = i.daysLeft < 0 ? 'Venceu há '+Math.abs(i.daysLeft)+' dias' : i.daysLeft === 0 ? 'Hoje' : i.daysLeft === 1 ? 'Amanhã' : 'Em '+i.daysLeft+' dias';
      return'<div class="bill-row">'
        +'<div style="display:flex;align-items:center;gap:8px">'+ibadge(g,22)+'<div><div class="bill-name">'+i.label+'</div><div style="font-size:11px;color:'+urgClr+';font-weight:600">'+dayLbl+'</div></div></div>'
        +'<span class="bill-amt" style="color:'+g.color+'">'+R(i.amount)+'</span>'
      +'</div>';
    }).join('');
    billsBlock = '<div class="sec-hdr"><div class="sec-hdr-lbl">&#128197; Vencimentos próximos</div></div>'

  // Goals preview
  var goals = D.goals||[];
  var goalsBlock = '';
  if(goals.length) {
    var gRows = goals.slice(0,3).map(function(g){
      var pct = g.target>0 ? Math.min(100, Math.round((g.saved/g.target)*100)) : 0;
      var left = g.target - g.saved;
      return'<div style="margin-bottom:12px">'
        +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">'
          +'<span style="font-size:13px;font-weight:600">'+g.label+'</span>'
          +'<span style="font-family:monospace;font-size:12px;color:var(--mt)">'+R(g.saved)+' / '+R(g.target)+'</span>'
        +'</div>'
        +'<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+pct+'%;background:'+(g.color||'var(--blu)')+'"></div></div>'
        +'<div style="font-size:11px;color:var(--mt);margin-top:3px;text-align:right">'+pct+'% · faltam '+R(left)+'</div>'
      +'</div>';
    }).join('');
    goalsBlock = '<div class="sec-hdr"><div class="sec-hdr-lbl">&#127919; Metas de economia</div><button class="sec-hdr-btn" onclick="window.openGoals()">Ver todas</button></div>'
      +'<div class="card">'+gRows+'</div>';
  }

  var actives=GR.filter(function(g){return st.cats[g.id].c > 0;});
  if(!actives.length) return '<div class="dash-wrapper">'+cards+extraBlock+billsBlock+goalsBlock+'<div class="empty"><div style="font-size:32px;opacity:.1;margin-bottom:12px">&#9632;</div><div>Nenhum dado para este mês.</div></div></div>';
  
  var rows='<div class="card" style="margin-bottom:0">'+actives.map(function(g){
    var c = st.cats[g.id];
    var pct = c.p > 0 ? Math.min(100,(c.s/c.p)*100) : 0;
    var over = c.p > 0 && c.s > c.p;
    var clr = over ? 'var(--red)' : (pct > 85 ? 'var(--amb)' : g.color);
    var catExps = getExp(m).filter(function(e){return e.group===g.id;});
    var cnt = catExps.length;

    return'<div class="gr clickable" onclick="window.openCatModal(\''+g.id+'\')">'
      +'<div class="grl">'+ibadge(g,32)+'<div class="gri"><div class="grn">'+g.label+'</div>'
      +(cnt?'<div class="grc">'+cnt+' lançamento'+(cnt>1?'s':'')+'</div>':'')
      +(c.p>0?'<div class="gbr" style="margin-top:6px"><div class="gbf" style="width:'+pct+'%;background:'+clr+'"></div></div>':'')
      +'</div></div>'
      +'<div class="grr"><div class="gra" style="color:'+(over?'var(--red)':g.color)+'">'+R(c.s)+'</div>'
      +(c.p>0?'<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--mt2);margin-top:2px">/ '+R(c.p)+'</div>':'')
      +'</div>'
    +'</div>';
  }).join('')+'</div>';

  var catBlock = '<div class="sec-hdr"><div class="sec-hdr-lbl">Por categoria</div><span style="font-size:11px;color:var(--blu);font-weight:600;cursor:pointer" onclick="">Clique em uma linha para ver detalhes</span></div>' + rows;
  return '<div class="dash-wrapper"><div>'+cards+extraBlock+billsBlock+goalsBlock+'</div><div>'+catBlock+'</div></div>';
}

          +chk+'<div class="pin" style="min-width:0"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">'+item.label+typTag+due+(item.isExtra?'<span class="pitag" style="background:var(--amb-l);color:var(--amb)">extra</span>':'')+'</div>'+noteTxt+'</div>'

      <div style="font-size:11px;color:var(--mt);padding-top:10px;border-top:1px solid var(--bd);margin-top:6px">Gerencie o tempo em <button onclick="window.setTab('parcelas')" style="background:none;border:none;color:var(--blu);cursor:pointer;font-size:11px;font-weight:600;text-decoration:underline;padding:0">Parcelas</button></div>

function rStats() {
  var m = U.month;
  var stCur = stats(m);

  // Build monthly history (last 6 months)
  var candidateMs = [];
  for(var i=11; i>=0; i--) candidateMs.push(shM(m, -i));
  var activeMs = candidateMs.filter(function(mo){ return getExp(mo).length > 0 || mo === m; });
  if(activeMs.indexOf(m) === -1) activeMs.push(m);
  activeMs = activeMs.slice(-6);

  var totalSav = 0; var activeCnt = 0;
  var chartData = activeMs.map(function(mo) {
    var s = (mo === m) ? stCur : stats(mo);
    var hasData = getExp(mo).length > 0;
    if(hasData){ totalSav += s.realSav; activeCnt++; }
    return { m: mo, sal: s.sal, c: s.committed, sav: s.realSav, hasData: hasData };
  });
  var avgSav = activeCnt > 0 ? totalSav / activeCnt : 0;

  // Comparison vs previous month
  var prevM = shM(m, -1);
  var stPrev = stats(prevM);
  var varPct = stPrev.gastoReal > 0 ? Math.round(((stCur.gastoReal - stPrev.gastoReal) / stPrev.gastoReal) * 100) : null;

  // KPI cards
  var livre = stCur.sal - stCur.committed;
  var kpiHTML = '<div class="dash-cards" style="margin-bottom:24px">'
    + [
      {label:'Receita Total',    value:R(stCur.sal),      color:'var(--grn)', sub:'salários + extras'},
      {label:'Gasto Real',       value:R(stCur.gastoReal),color:'var(--txt)', sub:'avulsos + fixos + parcelas'},
      {label:'Sobra do mês',     value:R(stCur.realSav),  color:stCur.realSav>=0?'var(--grn)':'var(--red)', sub:'meta: '+R(D.config.targetSavings)},
      {label:'Var. mês anterior',value:varPct!==null?(varPct>=0?'▲ +'+varPct+'%':'▼ '+varPct+'%'):'—',
       color:varPct===null?'var(--mt)':varPct>0?'var(--red)':'var(--grn)',
       sub:varPct!==null?(varPct>0?R(stCur.gastoReal-stPrev.gastoReal)+' a mais':R(stPrev.gastoReal-stCur.gastoReal)+' a menos'):'sem histórico'},
    ].map(function(k){
      return '<div class="sc" style="border-top:3px solid '+k.color+'">'
        +'<div class="sl">'+k.label+'</div>'
        +'<div class="sv" style="color:'+k.color+';font-size:17px">'+k.value+'</div>'
        +'<div class="ss">'+k.sub+'</div>'
      +'</div>';
    }).join('')
  +'</div>';

  // SVG Area Chart
  var W=520, H=160, padL=36, padR=16, padT=16, padB=28;
  var cW=W-padL-padR, cH=H-padT-padB;
  var n=chartData.length;
  var allV=[]; chartData.forEach(function(d){ allV.push(d.sal,d.c); });
  var vMin=allV.length?Math.max(0,Math.min.apply(null,allV)*0.9-500):0;
  var vMax=allV.length?Math.max.apply(null,allV)*1.08:15000;
  var xOf=function(i){return padL+(n>1?i/(n-1):0.5)*cW;};
  var yOf=function(v){return padT+cH-((v-vMin)/(vMax-vMin))*cH;};
  function smPath(pts){return pts.map(function(p,i){if(i===0)return'M'+p.x.toFixed(1)+' '+p.y.toFixed(1);var pv=pts[i-1];var cx=(pv.x+p.x)/2;return'C'+cx.toFixed(1)+' '+pv.y.toFixed(1)+' '+cx.toFixed(1)+' '+p.y.toFixed(1)+' '+p.x.toFixed(1)+' '+p.y.toFixed(1);}).join(' ');}
  var sPts=chartData.map(function(d,i){return{x:xOf(i),y:yOf(d.sal)};});
  var cPts=chartData.map(function(d,i){return{x:xOf(i),y:yOf(d.c)};});
  var sPath=smPath(sPts); var cPath=smPath(cPts);
  var bot=padT+cH;
  var sArea=sPath+' L'+xOf(n-1).toFixed(1)+' '+bot+' L'+padL+' '+bot+' Z';
  var cArea=cPath+' L'+xOf(n-1).toFixed(1)+' '+bot+' L'+padL+' '+bot+' Z';
  var gridL=[vMin,(vMin+vMax)/2,vMax].map(function(v){var y=yOf(v).toFixed(1);var lbl=v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0);return'<line x1="'+padL+'" x2="'+(padL+cW)+'" y1="'+y+'" y2="'+y+'" stroke="#e8ecf2" stroke-width="1"/><text x="'+(padL-4)+'" y="'+(parseFloat(y)+4)+'" font-size="9" fill="#94a3b8" text-anchor="end" font-family="DM Mono,monospace">'+lbl+'</text>';}).join('');
  var xLbl=chartData.map(function(d,i){var lbl=new Date(d.m+'-15').toLocaleDateString('pt-BR',{month:'short'}).replace('.','').toUpperCase();var cur=d.m===m;return'<text x="'+xOf(i).toFixed(1)+'" y="'+(padT+cH+18)+'" font-size="10" fill="'+(cur?'#0d1117':'#94a3b8')+'" text-anchor="middle" font-family="Plus Jakarta Sans,sans-serif" font-weight="'+(cur?'700':'400')+'">'+lbl+(cur?'*':'')+'</text>';}).join('');
  var curLbl=''; if(n>0){var ci=chartData.length-1;curLbl='<text x="'+xOf(ci).toFixed(1)+'" y="'+(yOf(chartData[ci].c)-10)+'" font-size="10" fill="#ef4444" text-anchor="middle" font-family="DM Mono,monospace">'+R(chartData[ci].c)+'</text>';}
  var svgChart='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible"><defs><linearGradient id="sgr1" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></linearGradient><linearGradient id="sgr2" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ef4444" stop-opacity="0.15"/><stop offset="100%" stop-color="#ef4444" stop-opacity="0"/></linearGradient></defs>'+gridL+'<path d="'+sArea+'" fill="url(#sgr1)"/><path d="'+cArea+'" fill="url(#sgr2)"/><path d="'+sPath+'" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/><path d="'+cPath+'" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>'+sPts.map(function(p,i){var cur=chartData[i].m===m;return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(cur?4:2.5)+'" fill="'+(cur?'#22c55e':'#fff')+'" stroke="#22c55e" stroke-width="2"/>';}).join('')+cPts.map(function(p,i){var cur=chartData[i].m===m;return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(cur?4:2.5)+'" fill="'+(cur?'#ef4444':'#fff')+'" stroke="#ef4444" stroke-width="2"/>';}).join('')+xLbl+curLbl+'</svg>';

  var chartCard='<div class="card" style="padding:20px;margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
      +'<div><div style="font-size:14px;font-weight:700;color:var(--txt)">Evolução dos Gastos</div>'
      +'<div style="font-size:12px;color:var(--mt);margin-top:2px">Últimos '+n+' meses · *mês atual em andamento</div></div>'
      +'<div style="display:flex;gap:14px">'
        +'<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mt)"><span style="width:16px;height:2px;background:#22c55e;border-radius:1px;display:inline-block"></span>Receita</span>'
        +'<span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mt)"><span style="width:16px;height:2px;background:#ef4444;border-radius:1px;display:inline-block"></span>Comprometido</span>'
      +'</div>'
    +'</div>'
    +svgChart
  +'</div>';

  // Goals block
  var goals=D.goals||[];
  var goalsBlock='';
  if(goals.length){
    var gRows=goals.slice(0,3).map(function(g){
      var p2=g.target>0?Math.min(100,Math.round((g.saved/g.target)*100)):0;
      var gc=g.color||'var(--blu)';
      var rSz=44,rr=16,rcirc=2*Math.PI*rr,rfill=p2/100*rcirc;

        +'<div style="font-size:14px;font-weight:700;color:var(--txt)">Metas de Economia</div>'

  // Top spending days

  if(catTotal>0){catData.forEach(function(d){if(!d.value)return;var sweep=(d.value/catTotal)*2*Math.PI;var gap=sweep>0.15?0.05:0;var x1=cx+r*Math.cos(ang+gap/2);var y1=cy+r*Math.sin(ang+gap/2);var x2=cx+r*Math.cos(ang+sweep-gap/2);var y2=cy+r*Math.sin(ang+sweep-gap/2);var large=(sweep-gap)>Math.PI?1:0;arcs+='<path d="M '+x1.toFixed(2)+' '+y1.toFixed(2)+' A '+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+'" fill="none" stroke="'+d.color+'" stroke-width="'+sw+'"/>';ang+=sweep;});}

  var legend=catData.slice(0,7).map(function(d){var pct=catTotal>0?((d.value/catTotal)*100).toFixed(0):0;return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)"><div style="width:8px;height:8px;border-radius:50%;background:'+d.color+';flex-shrink:0"></div><div style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">'+d.label+'</div><div style="font-family:\'DM Mono\',monospace;font-size:12px;font-weight:600;color:'+d.color+'">'+R(d.value)+'</div><div style="font-size:11px;color:var(--mt);width:30px;text-align:right">'+pct+'%</div></div>';}).join('')||'<div style="font-size:13px;color:var(--mt);padding:8px 0">Nenhum gasto registrado este mês.</div>';

  // Layout
  var hasEnoughData = activeCnt <= 1;
  return '<div style="max-width:900px;margin:0 auto">'
    +'<div style="margin-bottom:24px">'
      +'<h2 style="font-size:22px;font-weight:800;letter-spacing:-0.03em;color:var(--txt)">Inteligência Financeira</h2>'
      +'<p style="font-size:13px;color:var(--mt);margin-top:3px">'+mLbl(m)+' · análise consolidada</p>'
    +'</div>'
    +kpiHTML
    +(hasEnoughData?'<div class="notice" style="margin-bottom:16px">Você começou a registrar agora. O histórico de meses vai aparecer aqui conforme você usar o app.</div>':'')
    +'<div class="stats-layout">'
      +'<div>'
        +chartCard
        +goalsBlock
        +'<div class="card" style="margin-bottom:16px">'
          +'<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:14px">Dias de Maior Gasto — '+mLbl(m).split(' ')[0]+'</div>'
          +topDaysHTML
        +'</div>'
        +resumoHTML
      +'</div>'
      +'<div>'
        +'<div class="card">'
          +'<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:14px">Por Categoria — '+mLbl(m).split(' ')[0]+'</div>'
          +'<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:4px" class="stats-donut-row">'+donutSVG+'<div style="flex:1;min-width:140px">'+legend+'</div></div>'
        +'</div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function rCalendar() {
  var m = U.month;
  var year = parseInt(m.split('-')[0]);
  var month = parseInt(m.split('-')[1]) - 1;
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var todayStr = tod();
  
  var exps = getExp(m);
  var expByDay = {};
  exps.forEach(function(e) {
    var d = parseInt(e.date.split('-')[2], 10);
    if(!expByDay[d]) expByDay[d] = [];
    expByDay[d].push(e);
  });
  
  var html = '<div class="fs" style="max-width:800px"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><div><div class="ftit">Calendário Mensal</div><div class="fsub">' + mLbl(m) + '</div></div></div>';
  html += '<div class="notice">Clique em um dia para ver os lançamentos detalhados na aba de Gastos.</div>';
  html += '<div class="cal-wrap"><table class="cal"><thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead><tbody><tr>';
  
  var dayCount = 1;
  for (var i = 0; i < 42; i++) {
    if (i % 7 === 0 && i > 0) html += '</tr><tr>';
    if (i < firstDay || dayCount > daysInMonth) {
      html += '<td class="off"></td>';
    } else {
      var dStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(dayCount).padStart(2,'0');
      var isToday = (dStr === todayStr);
      var dayClass = isToday ? 'cal-day today' : 'cal-day';
      var iconsHtml = '';
      if(expByDay[dayCount]) {
        var groups = [];
        expByDay[dayCount].forEach(function(e) { if(groups.indexOf(e.group)===-1) groups.push(e.group); });
        iconsHtml = '<div class="cal-icons">' + groups.map(function(gid) {
          var g = gBy(gid);
          return '<span class="cal-ico" style="background:'+g.color+'22;color:'+g.color+'" title="'+g.label+'">' + (ICO[g.id]||ICO.outros) + '</span>';
        }).join('') + '</div>';
      }
      html += '<td onclick="window.filterByDate(\''+dStr+'\')"><span class="'+dayClass+'">'+dayCount+'</span>'+iconsHtml+'</td>';
      dayCount++;
    }
    if (dayCount > daysInMonth && i % 7 === 6) break; 
  }
  html += '</tbody></table></div></div>';
  return html;
}

function rGastosMes(){
  var m = U.month;
  var st = stats(m);
  var planned = getPlanned(m);
  var exps = getExp(m);

  var totalGeral = 0;
  var blocos = GR.map(function(g){
    var plannedItems = planned.filter(function(i){ return i.group === g.id; });
    var expItems     = exps.filter(function(e){ return e.group === g.id; });
    var cat          = st.cats[g.id];
    var committed    = cat ? cat.c : 0;
    if(!committed && !plannedItems.length && !expItems.length) return '';
    totalGeral += committed;

    var sumExp    = cat ? cat.s : 0;
    var sumPlanned= cat ? cat.p : 0;
    var overBudget= sumExp > sumPlanned && sumPlanned > 0;

    var rows = '';

    if(expItems.length){
      if(plannedItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px">Realizado</div>';
      expItems.forEach(function(e){
        var dl = new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        rows += '<div class="pi"><div class="pin">'+(e.description||g.label)
          +'<span class="pitag" style="background:'+g.color+'18;color:'+g.color+'">'+dl+'</span></div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:'+g.color+'">'+R(e.amount)+'</span></div>';
      });
    }

    if(plannedItems.length){
      if(expItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px;margin-top:4px;border-top:1px solid var(--bd)">Previsto/Fixo</div>';
      plannedItems.forEach(function(i){
        var typeTag = !isEst(i)
          ? '<span class="pitag" style="background:#f0fdf4;color:var(--grn)">invariável</span>'
          : i.isParcela
            ? '<span class="pitag" style="background:var(--pur-l);color:var(--pur)">parcela</span>'
            : i.isExtra
              ? '<span class="pitag" style="background:var(--amb-l);color:var(--amb)">extra</span>'
              : '<span class="pitag" style="background:var(--s2);color:var(--mt)">estimativa</span>';
        rows += '<div class="pi"><div class="pin">'+i.label+typeTag+'</div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:600;color:'+(overBudget?'var(--mt2)':'var(--mt)')+'">'+R(i.amount)+'</span></div>';
      });
      if(overBudget)
        rows += '<div style="font-size:11px;color:var(--amb);padding:4px 0">Realizado supera o planejado</div>';
    }

    var headerRight = sumExp > 0 && sumExp !== committed
      ? '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--red)':g.color)+'">'+R(sumExp)+'</div><div style="font-family:monospace;font-size:11px;color:var(--mt2)">teto: '+R(committed)+'</div></div>'
      : '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--amb)':g.color)+'">'+R(committed)+'</div></div>';
    return '<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)">'
        +'<div style="display:flex;align-items:center;gap:8px">'+ibadge(g,26)
          +'<span style="font-size:14px;font-weight:700">'+g.label+'</span></div>'
        +headerRight
      +'</div>'+rows+'</div>';
  }).join('');

  if(!blocos.replace(/\s/g,''))
    blocos = '<div class="empty">Nenhum dado para este mês.</div>';

function rParcelas(){
  var now=U.month;var months=[];
  for(var i=-3;i<=14;i++)months.push(shM(now,i));
  var carroInst=D.installments.filter(function(i){return i.group==='carro';});
  var cardInst=D.installments.filter(function(i){return i.group==='parcelas';});
  var activeCard=cardInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);});
  var totCard=activeCard.reduce(function(s,i){return s+i.amount;},0);
  var summary='<div class="dash-cards" style="margin-bottom:24px"><div class="sc"><div class="sl">Parcelas ativas (neste mês)</div><div class="sv" style="color:var(--pur)">'+R(totCard)+'</div><div class="ss">'+activeCard.length+' parcelas rolando</div></div><div class="sc"><div class="sl">Carro (neste mês)</div><div class="sv" style="color:var(--txt)">'+R(carroInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);}).reduce(function(s,i){return s+i.amount;},0))+'</div><div class="ss">Financiamento + IPVA se houver</div></div></div>';
  
  function rGrp(label,list,gid){
    if(!list.length)return'';
    var g=gBy(gid);
    var abated=(D.instAbatimentos&&D.instAbatimentos[now])||[];
    var rows=list.map(function(inst){
      var tms=months.map(function(mm){
        var on=mm>=inst.start&&(!inst.end||mm<=inst.end);
        var isCur=mm===now;var isPast=mm<now&&on;
        if(!on)return'<div class="tm tm-off">'+mm.slice(5)+'</div>';
        var isAbat=isCur&&abated.indexOf(inst.id)>=0;
        var bg=isAbat?'#94a3b8':(g.color+(isPast?'66':'dd'));
        return'<div class="tm "'+(isCur?'tm-cur':isPast?'tm-past':'tm-fut')+'" style="background:'+bg+';border-color:'+bg+';'+(isAbat?'text-decoration:line-through;opacity:.7':'')+'">'+mm.slice(5)+'</div>';
      }).join('');
      var isActiveNow=inst.start<=now&&(!inst.end||inst.end>=now);
      var isAbatNow=abated.indexOf(inst.id)>=0;
      var abatBtn=isActiveNow
        ?'<button class="bs '+(isAbatNow?'bgrn':'be')+'" style="'+(isAbatNow?'background:var(--grn);color:#fff;border-color:var(--grn)':'')+'" onclick="window.toggleAbatimento(\''+inst.id+'\')">'+( isAbatNow?'&#10003; Abatido neste mês':'Abater este mês')+'</button>'
        :'';
      return'<div class="card tlrow" style="margin-bottom:0"><div class="tlhdr"><div><div class="tln">'+ibadge(g,26)+' '+inst.label+(isAbatNow?' <span style="font-size:10px;background:#dcfce7;color:var(--grn-d);padding:2px 7px;border-radius:6px;font-weight:700;margin-left:4px">abatido</span>':'')+' </div>'+(inst.notes?'<div class="tlnote">'+inst.notes+'</div>':'')+' </div><div class="tla" style="color:'+(isAbatNow?'var(--mt2)':g.color)+';'+(isAbatNow?'text-decoration:line-through':'')+' ">'+R(inst.amount)+'<span style="font-size:11px;font-weight:400;color:var(--mt)">/mês</span></div></div><div class="tlmonths">'+tms+'</div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">'+abatBtn+'<button class="bs be" onclick="window.openInstEdit(\''+inst.id+'\')">Editar Detalhes</button></div></div>';
    }).join('');
    return'<div style="margin-bottom:32px"><div class="sec" style="margin-top:0;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:8px">'+ism(gid,g.color)+' <span style="font-size:13px">'+label+'</span></div><div class="cards-grid">'+rows+'</div></div>';
  }
  return summary + rGrp('Carro',carroInst,'carro') + rGrp('Parcelas Cartão',cardInst,'parcelas');
}

    : confirmDelExtra;

  var orig = D.fixedItems.find(function(i){return i.id===id;}) || {};
  var curDueDay = orig.dueDay || '';

window.handleImportFile = async function(input) {
  var file = input.files[0];
  if(!file) return;
  var lbl = document.getElementById('imp-file-lbl');
  if(lbl) lbl.textContent = 'Processando: ' + file.name + '...';

  var ext = file.name.split('.').pop().toLowerCase();

  if(ext === 'csv' || ext === 'txt') {
    // Read as text directly
    var reader = new FileReader();
    reader.onload = function(e) {
      var ta = document.getElementById('tsv-input');
      if(ta) { ta.value = e.target.result; if(lbl) lbl.textContent = file.name + ' carregado. Clique em Analisar.'; }
    };
    reader.readAsText(file, 'UTF-8');
  } else if(ext === 'xlsx' || ext === 'xls') {
    try {
      // Load SheetJS dynamically
      var XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      var reader2 = new FileReader();
      reader2.onload = function(e) {
        try {
          var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
          var ws = wb.Sheets[wb.SheetNames[0]];
          var csv = XLSX.utils.sheet_to_csv(ws, {FS:'\t'});
          var ta = document.getElementById('tsv-input');
          if(ta) { ta.value = csv; if(lbl) lbl.textContent = file.name + ' carregado (' + wb.SheetNames[0] + '). Clique em Analisar.'; }
        } catch(err) {
          if(lbl) lbl.textContent = 'Erro ao ler o arquivo: ' + err.message;
        }
      };
      reader2.readAsArrayBuffer(file);
    } catch(err) {
      if(lbl) lbl.textContent = 'Erro ao carregar leitor XLSX: ' + err.message;
    }
  } else {
    if(lbl) lbl.textContent = 'Formato não suportado. Use .xlsx, .csv ou .txt';
  }
};

window.analyzeImport=function(){
  var raw=(document.getElementById('tsv-input').value||'').trim();
  if(!raw){alert('Cole ou carregue algum dado antes de analisar.');return;}
  var isPrev=U.importTarget==='prev';
  var lines=raw.split(/\r?\n/).map(function(l){return l.trim();}).filter(Boolean);
  var result=[];

  lines.forEach(function(line){
    var parts=line.split(/\t|;|,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(function(p){return p.replace(/^"|"$/g,'').trim();});
    if(parts.length<2)return;

    var amount=0,description='',date=tod(),group='outros';

    // Tenta achar valor numérico em qualquer coluna
    var amtIdx=-1;
    parts.forEach(function(p,i){
      var n=parseFloat(p.replace(/\./g,'').replace(',','.').replace(/[^\d.-]/g,''));
      if(!isNaN(n)&&n>0&&amtIdx===-1){amtIdx=i;amount=Math.round(n*100)/100;}
    });
    if(!amount)return;

    // Tenta achar data em qualquer coluna (dd/mm/yyyy ou yyyy-mm-dd)
    parts.forEach(function(p){
      var m=p.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
      if(m){var yr=m[3].length===2?'20'+m[3]:m[3];date=yr+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');}
      var m2=p.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(m2){date=p;}
    });

    // Descrição: qualquer coluna que não seja número nem data
    var descParts=parts.filter(function(p,i){
      if(i===amtIdx)return false;
      if(/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(p))return false;
      if(/^\d{4}-\d{2}-\d{2}$/.test(p))return false;
      if(/^[\d.,\-R$\s]+$/.test(p)&&p.replace(/[^\d]/g,'').length>3)return false;
      return p.length>0;
    });
    description=descParts.join(' ').trim()||'Importado';

    // Auto-categorização por palavra-chave
    var dl=description.toLowerCase();
    if(/uber|99|taxi|transporte|gasolina|combustivel|posto|metrô|ônibus/.test(dl))group='transporte';
    else if(/ifood|rappi|lanche|restaurante|pizza|hamburger|sushi|padaria|café|bistro|subway|mcdonald|burger/.test(dl))group='lanches';
    else if(/mercado|supermercado|carrefour|extra|pão de açúcar|assaí|sacolão|hortifruti|mikami|atacadão/.test(dl))group='mercado';
    else if(/netflix|amazon|disney|spotify|youtube|prime|hbo|apple|crunch|deezer/.test(dl))group='assinaturas';
    else if(/saúde|farmácia|droga|médico|dentista|consulta|exame|hospital|plano de saúde/.test(dl))group='saude';
    else if(/carro|seguro|ipva|iptu|financiamento|parcela carro|revisão|pneu|mecânico/.test(dl))group='carro';
    else if(/cachorro|pet|banho|tosa|ração|veterinário/.test(dl))group='cachorro';
    else if(/aluguel|condomínio|luz|água|internet|claro|tim|vivo|oi|energia|gás/.test(dl))group='casa';
    else if(/igreja|dízimo|oferta|doação|missão/.test(dl))group='igreja';

    if(isPrev){
      result.push({id:uid(),description:description,amount:amount,group:group});
    } else {
      result.push({id:uid(),date:date,amount:amount,group:group,description:description});
    }
  });

  if(!result.length){alert('Nenhuma linha válida encontrada. Verifique o formato dos dados.');return;}
  U.importPreview=result;
  render();
};

// ── Helpers de parcela ──────────────────────────────────────────────────────
function monthDiff(a, b) {
  var ap=a.split('-').map(Number), bp=b.split('-').map(Number);
  return (bp[0]-ap[0])*12 + (bp[1]-ap[1]);
}
function instParcelInfo(inst, m) {
  var cur, tot;
  var match = inst.notes && inst.notes.match(/Parcelas\s+(\d+)\s+a\s+(\d+)\/(\d+)/);
  if(match){
    tot = parseInt(match[3]);
    cur = parseInt(match[1]) + monthDiff(inst.start, m);
  } else if(inst.start && inst.end){
    tot = monthDiff(inst.start, inst.end) + 1;
    cur = monthDiff(inst.start, m) + 1;
  } else if(inst.start){
    cur = monthDiff(inst.start, m) + 1; tot = null;
  }
  return {cur: cur, tot: tot};
}

function rGastosInvariavelSection(m) {
  var planned = getPlanned(m);
  var invItems = planned.filter(function(i){ return i.isFixed && !isEst(i); });
  if(!invItems.length) return '';
  var tot = invItems.reduce(function(s,i){return s+i.amount;},0);
  var rows = invItems.map(function(i){
    var g = gBy(i.group);
    return '<div class="pi">'
      +'<div class="pin" style="display:flex;align-items:center;gap:8px">'+ibadge(g,20)+' '+i.label+'</div>'
      +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--grn)">'+R(i.amount)+'</span>'
      +'</div>';
  }).join('');
  return '<div style="background:var(--grn-l);border:1px solid #86efac;border-radius:12px;padding:14px 16px;margin-bottom:12px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #86efac">'
      +'<span style="font-size:13px;font-weight:700;color:var(--grn-d)">Contas invariáveis do mês</span>'
      +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--grn-d)">'+R(tot)+'</span>'
    +'</div>'
    +rows
    +'<div style="font-size:11px;color:var(--grn-d);margin-top:8px;opacity:.7">Já comprometidos, independente de lançamentos.</div>'
  +'</div>';
}

function rGastosParcelasSection(m) {
  var active = getActiveInst(m);
  if(!active.length) return '';
  var tot = active.reduce(function(s,i){return s+i.amount;},0);
  var g = gBy('parcelas');
  var rows = active.map(function(inst){
    var info = instParcelInfo(inst, m);
    var parcLabel = info.tot ? ('Parcela '+info.cur+'/'+info.tot) : ('Parcela '+info.cur);
    return '<div class="pi">'
      +'<div class="pin">'+inst.label+'<br><span style="font-size:11px;color:var(--mt2);font-weight:400">'+parcLabel+'</span></div>'
      +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--pur)">'+R(inst.amount)+'</span>'

    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #ddd6fe">'
      +'<div style="display:flex;align-items:center;gap:8px">'+ibadge(g,24)

      +'</div>'
      +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--pur)">'+R(tot)+'</span>'
    +'</div>'
    +rows
  +'</div>';
}

window.qeConfirm=function(){
  if(!U.parsed)return;
  var p=U.parsed;
  var now=new Date().toISOString();

  if(p.isParceled && p.numParcelas >= 2) {
    var n = Math.max(2, parseInt(p.numParcelas,10)||2);
    var unitAmt = Math.round((p.amount / n) * 100) / 100;
    var firstAmt = Math.round((p.amount - (unitAmt * (n - 1))) * 100) / 100;
    var startMonth = p.date.slice(0,7);
    
    // Parcela 1: expense no mês atual (absorve a diferença de centavos se houver)
    D.expenses=[{id:uid(),date:p.date,amount:firstAmt,group:p.group,
      description:p.description+' (1/'+n+')',note:'Parcelado: 1 de '+n+' · Total '+R(p.amount),
      createdAt:now,updatedAt:now}].concat(D.expenses);
      
    // Parcelas 2..N: installment nos meses seguintes
    var nextMonth = shM(startMonth, 1);
    var endMonth = shM(startMonth, n - 1);
    D.installments=D.installments.concat([{
      id:'pi-'+uid(),label:p.description,amount:unitAmt,group:'parcelas',
      start:nextMonth,end:endMonth,
      notes:'Parcelas 2 a '+n+'/'+n+' · '+R(unitAmt)+'/mês · Total: '+R(p.amount)
    }]);
  } else {
    D.expenses=[{id:uid(),date:p.date,amount:p.amount,group:p.group,description:p.description,note:'',createdAt:now,updatedAt:now}].concat(D.expenses);
  }
  U.qe='';U.parsed=null;sset(D);render();

  var desc=document.getElementById('fa-dc').value.trim();

  var npEl=document.getElementById('fa-np');

  var now=new Date().toISOString();

  if(n>=2){

    var firstAmt=Math.round((totalAmt - (unitAmt * (n - 1))) * 100) / 100;
    var startMonth=date.slice(0,7);
    
    D.expenses=[{id:uid(),date:date,amount:firstAmt,group:U.sel,
      description:(desc||gBy(U.sel).label)+' (1/'+n+')',
      note:'Parcelado: 1 de '+n+' · Total '+R(totalAmt)+(note?' · '+note:''),
      createdAt:now,updatedAt:now}].concat(D.expenses);
      
    var nextMonth=shM(startMonth,1);
    var endMonth=shM(startMonth,n-1);
    D.installments=D.installments.concat([{
      id:'pi-'+uid(),label:(desc||gBy(U.sel).label),amount:unitAmt,group:'parcelas',
      start:nextMonth,end:endMonth,
      notes:'Parcelas 2 a '+n+'/'+n+' · '+R(unitAmt)+'/mês · Total: '+R(totalAmt)
    }]);
  } else {
    D.expenses=[{id:uid(),date:date,amount:totalAmt,group:U.sel,
      description:desc,note:note,
      createdAt:now,updatedAt:now}].concat(D.expenses);

};

window.openCatModal=function(gid){
  var m=U.month;
  var g=gBy(gid);
  var st=stats(m);
  var c=st.cats[gid];
  var catExps=getExp(m).filter(function(e){return e.group===gid;}).slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var pct=c.p>0?Math.min(100,Math.round((c.s/c.p)*100)):0;
  var over=c.p>0&&c.s>c.p;
  var clr=over?'var(--red)':(pct>85?'var(--amb)':g.color);

  var expRows=catExps.length
    ?catExps.map(function(e){
        var dl=new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-top:1px solid var(--bd)">'
          +'<div style="min-width:0;flex:1"><div style="font-size:14px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(e.description||g.label)+'</div>'
          +(e.note?'<div style="font-size:11px;color:var(--mt2);margin-top:1px">'+e.note+'</div>':'')
          +'<div style="font-size:11px;color:var(--mt2);margin-top:1px">'+dl+'</div></div>'
          +'<span style="font-family:\'DM Mono\',monospace;font-size:14px;font-weight:700;color:'+g.color+';margin-left:12px;flex-shrink:0">'+R(e.amount)+'</span>'
        +'</div>';
      }).join('')
    :'<div style="font-size:13px;color:var(--mt2);padding:16px 0">Nenhum lançamento nesta categoria.</div>';

  var progBar=c.p>0
    ?'<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><span style="font-size:12px;color:var(--mt);font-weight:600">Gasto / Previsto</span><span style="font-size:14px;font-weight:700;color:'+clr+'">'+pct+'%</span></div>'
      +'<div style="height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:8px"><div style="height:100%;border-radius:4px;background:'+clr+';width:'+pct+'%;transition:width 0.4s ease"></div></div>'
      +'<div style="display:flex;justify-content:space-between"><span style="font-family:\'DM Mono\',monospace;font-size:15px;font-weight:700;color:var(--txt)">'+R(c.s)+'</span><span style="font-family:\'DM Mono\',monospace;font-size:13px;color:var(--mt2)">/ '+R(c.p)+'</span></div>'
    +'</div>'
    :'<div style="font-family:\'DM Mono\',monospace;font-size:20px;font-weight:700;color:'+g.color+';margin-bottom:16px">'+R(c.s)+'</div>';

  var html='<div class="cat-overlay" id="cat-overlay" onclick="if(event.target===this)window.closeCatModal()">'
    +'<div class="cat-modal">'
      +'<div class="cat-modal-hdr">'
        +'<div style="display:flex;align-items:center;gap:12px">'+ibadge(g,40)
          +'<div><div style="font-size:18px;font-weight:700;letter-spacing:-0.02em">'+g.label+'</div>'
          +'<div style="font-size:12px;color:var(--mt);margin-top:2px">'+catExps.length+' lançamento'+(catExps.length!==1?'s':'')+'</div></div>'
        +'</div>'
        +'<button class="cat-modal-close" onclick="window.closeCatModal()">&#10005;</button>'
      +'</div>'
      +'<div class="cat-modal-body">'
        +progBar
        +'<div style="font-size:10px;font-weight:700;color:var(--mt);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Lançamentos</div>'
        +expRows
      +'</div>'
    +'</div>'
  +'</div>';

  var el=document.createElement('div');
  el.innerHTML=html;
  document.body.appendChild(el.firstChild);
};

window.closeCatModal=function(){
  var el=document.getElementById('cat-overlay');
  if(el)el.remove();
};
// Fechar modal com Escape
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') window.closeCatModal && window.closeCatModal();
});

// ── Contas Previstas: seleção em lote ───────────────────────────────────────
window.toggleBulkMode=function(){
  U.bulkMode=!U.bulkMode;
  U.bulkSel={};
  render();
};

window.toggleBulkItem=function(el, id){
  var c=el.querySelector('input[type=checkbox]');
  if(c){
    c.checked=!c.checked;
    U.bulkSel[id]=c.checked;
    var countSpan=document.getElementById('bulk-count');
    if(countSpan){
      countSpan.textContent=Object.keys(U.bulkSel).filter(function(k){return U.bulkSel[k]}).length+' selecionado(s)';
    }
  }
};

window.bulkSetType=function(estVal){
  var ids=Object.keys(U.bulkSel).filter(function(k){return U.bulkSel[k];});
  if(!ids.length)return;
  D.fixedItems=D.fixedItems.map(function(i){
    return ids.indexOf(i.id)>=0 ? Object.assign({},i,{isEstimate:estVal}) : i;
  });
  U.bulkSel={};U.bulkMode=false;
  sset(D);render();
};

// ── Segurança: trocar email/senha ────────────────────────────────────────────
window.changePassword=function(){
  var p1 = document.getElementById('cfg-pwd').value;
  var p2 = document.getElementById('cfg-pwd-conf').value;
  if(!p1 || p1.length < 6){ U.secMsg={ok:false,txt:'A senha deve ter pelo menos 6 caracteres.'}; render(); return; }
  if(p1 !== p2){ U.secMsg={ok:false,txt:'As senhas não coincidem. Tente novamente.'}; render(); return; }
  
  var user=auth.currentUser;
  if(!user){U.secMsg={ok:false,txt:'Usuário não encontrado.'};render();return;}
  import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js').then(function(m){
    m.updatePassword(user,p1).then(function(){
      U.secMsg={ok:true,txt:'Senha atualizada com sucesso!'};render();
    }).catch(function(e){
      var msg=e.code==='auth/requires-recent-login'?'Por segurança, faça login novamente para alterar sua senha.':'Erro ao alterar: '+e.message;
      U.secMsg={ok:false,txt:msg};render();
    });
  });
};

window.openGoals=function(){ U.scr='goals'; render(); };

window.addGoal=function(){
  var nm=(document.getElementById('goal-nm')||{}).value||'';
  var tg=pn((document.getElementById('goal-tg')||{}).value);
  var sv=pn((document.getElementById('goal-sv')||{}).value||'0');
  var cl=(document.getElementById('goal-cl')||{}).value||'#3b82f6';
  var nt=(document.getElementById('goal-nt')||{}).value||'';
  if(!nm.trim()||!tg){return;}
  if(!D.goals)D.goals=[];
  
  if(U.editGoalId) {
    D.goals = D.goals.map(function(g){ 
      return g.id === U.editGoalId ? Object.assign({}, g, {label:nm.trim(), target:tg, saved:sv, color:cl, notes:nt.trim()}) : g; 
    });
    U.editGoalId = null;
  } else {
    D.goals.push({id:uid(),label:nm.trim(),target:tg,saved:sv,color:cl,notes:nt.trim()});
  }
  sset(D);render();
};

window.depositGoal=function(id){
  var el=document.getElementById('dep-'+id);
  var v=el?pn(el.value):0;
  if(!v)return;
  if(!D.goals)D.goals=[];
  D.goals=D.goals.map(function(g){
    return g.id!==id?g:Object.assign({},g,{saved:Math.min(g.target,g.saved+v)});
  });
  sset(D);render();
};

window.openEditGoal=function(id){
  var g = (D.goals||[]).find(function(x){ return x.id === id; });
  if(!g) return;
  U.editGoalId = id;
  U.scr = 'goals';
  render();
  
  setTimeout(function(){
    var nmEl = document.getElementById('goal-nm');
    if(nmEl) {
      nmEl.value = g.label;
      document.getElementById('goal-tg').value = g.target;
      document.getElementById('goal-sv').value = g.saved;
      document.getElementById('goal-cl').value = g.color;
      document.getElementById('goal-nt').value = g.notes || '';
      nmEl.scrollIntoView({behavior: 'smooth', block: 'center'});
      nmEl.focus();
    }
  }, 50);
};

window.delGoalDo=function(id){
  if(!D.goals)return;
  D.goals=D.goals.filter(function(g){return g.id!==id;});
  U.del=null;sset(D);render();
};

// ── CSV Export ───────────────────────────────────────────────────────────────
window.exportCSV=function(){
  var rows=['Data,Descricao,Categoria,Valor'];
  var exps=D.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  exps.forEach(function(e){
    var g=gBy(e.group);
    var desc=(e.description||g.label).replace(/,/g,' ');
    rows.push(e.date+','+desc+','+g.label+','+e.amount.toFixed(2).replace('.',','));
  });
  var csv=rows.join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='gastos-'+mM()+'.csv';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
};

<script>
// Drag-to-scroll para elementos com overflow horizontal no desktop
(function(){
  var SEL = '.chips, .tlmonths, .tabs, .stats-bar-wrap, .tbl-wrap, .cal-wrap';
  var dragging = false, el = null, startX = 0, scrollLeft = 0;

  function attach(node){
    if(node._dragScroll) return;
    node._dragScroll = true;
    node.style.cursor = 'grab';
    node.addEventListener('mousedown', function(e){
      if(e.button !== 0) return;
      dragging = true; el = node;
      startX = e.pageX - node.offsetLeft;
      scrollLeft = node.scrollLeft;
      node.style.cursor = 'grabbing';
      node.style.userSelect = 'none';
      e.preventDefault();
    });
  }

  document.addEventListener('mousemove', function(e){
    if(!dragging || !el) return;
    var x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX);
  });

  document.addEventListener('mouseup', function(){
    if(!el) return;
    el.style.cursor = 'grab';
    el.style.userSelect = '';
    dragging = false; el = null;
  });

  document.addEventListener('mouseleave', function(){
    if(!el) return;
    el.style.cursor = 'grab';
    el.style.userSelect = '';
    dragging = false; el = null;
  });

  // Observa mudanças no DOM e aplica a novos elementos
  var observer = new MutationObserver(function(){
    document.querySelectorAll(SEL).forEach(attach);
  });
  observer.observe(document.body, { childList: true, subtree: true });
  document.querySelectorAll(SEL).forEach(attach);
})();
</script>
