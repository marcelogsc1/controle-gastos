function mM(){return new Date().toISOString().slice(0,7);}
function tod(){return new Date().toISOString().slice(0,10);}
function R(n){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0);}
function mLbl(m){return new Date(m+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});}
function shM(m,d){var p=m.split('-').map(Number);var dt=new Date(p[0],p[1]-1+d,1);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function gBy(id){return GR.find(function(g){return g.id===id;})||GR[GR.length-1];}
function pn(v){var n=parseFloat((v||'0').replace(',','.'));return isNaN(n)?0:n;}
function totSal(){return D.config.salaries.reduce(function(s,x){return s+x.amount;},0);}
function bclr(pct,over){return over?'var(--red)':pct>80?'var(--amb)':'var(--grn)';}

function getActiveInst(m){
  return D.installments.filter(function(i){return i.group==='parcelas'&&i.start<=m&&(!i.end||i.end>=m);});
}
function getPlanned(m){
  var ov=D.monthOverrides[m]||{};
  var ex=(D.monthExtras[m]||[]).map(function(e){return Object.assign({},e,{isExtra:true});});
  var items=D.fixedItems
    .filter(function(i){return ov[i.id]&&ov[i.id].active===false?false:true;})
    .map(function(i){return Object.assign({},i,{amount:ov[i.id]&&ov[i.id].amount!==undefined?ov[i.id].amount:i.amount,isFixed:true});});
  var inst=getActiveInst(m).map(function(i){return Object.assign({},i,{isParcela:true});});
  return items.concat(ex).concat(inst);
}
function getExp(m){return D.expenses.filter(function(e){return e.date.slice(0,7)===m;});}
function gSpent(m,g){return getExp(m).filter(function(e){return e.group===g;}).reduce(function(s,e){return s+e.amount;},0);}
function gPlanned(m,g){return getPlanned(m).filter(function(i){return i.group===g;}).reduce(function(s,i){return s+i.amount;},0);}
function stats(m){
  var sal=totSal();
  var pl=getPlanned(m).reduce(function(s,i){return s+i.amount;},0);
  var sp=getExp(m).reduce(function(s,e){return s+e.amount;},0);
  return{sal:sal,pl:pl,sp:sp,projSav:sal-pl,realSav:sal-sp};
}

function parseQEtxt(txt){
  if(!txt.trim())return null;
  var low=txt.toLowerCase();
  var am=txt.match(/\d+(?:[.,]\d+)?/);
  if(!am)return null;
  var amount=parseFloat(am[0].replace(',','.'));
  if(!amount)return null;
  var group='outros';
  var keys=Object.keys(KW);
  for(var i=0;i<keys.length;i++){
    var g=keys[i];var ws=KW[g];
    if(ws.some(function(w){return low.indexOf(w)>=0;})){group=g;break;}
  }
  var desc=txt.replace(/R?\$?\s*\d+(?:[.,]\d+)?/i,'').replace(/\s+/g,' ').trim()||gBy(group).label;
  return{amount:amount,group:group,description:desc,date:tod()};
}

  var activeCard=cardInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);});
  var totCard=activeCard.reduce(function(s,i){return s+i.amount;},0);
  var summary='<div class="sg" style="margin-bottom:12px"><div class="sc"><div class="sl">Parcelas cartao (mes atual)</div><div class="sv" style="color:var(--pur)">'+R(totCard)+'</div><div class="ss">'+activeCard.length+' parcela'+(activeCard.length!==1?'s':'')+' ativa'+(activeCard.length!==1?'s':'')+'</div></div><div class="sc"><div class="sl">Carro (mes atual)</div><div class="sv" style="color:var(--txt)">'+R(carroInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);}).reduce(function(s,i){return s+i.amount;},0))+'</div><div class="ss">Parcela + IPVA se houver</div></div></div>';
  function rGrp(label,list,gid){
    if(!list.length)return'';
    var g=gBy(gid);
    var rows=list.map(function(inst){
      var tms=months.map(function(mm){
        var on=mm>=inst.start&&(!inst.end||mm<=inst.end);
        var isCur=mm===now;var isPast=mm<now&&on;
        if(!on)return'<div class="tm tm-off">'+mm.slice(5)+'</div>';
        var bg=g.color+(isPast?'66':'dd');
        return'<div class="tm '+(isCur?'tm-cur':isPast?'tm-past':'tm-fut')+'" style="background:'+bg+';border-color:'+bg+'">'+mm.slice(5)+'</div>';
      }).join('');
      return'<div class="card tlrow"><div class="tlhdr"><div><div class="tln">'+ibadge(g,22)+' '+inst.label+'</div>'+(inst.notes?'<div class="tlnote">'+inst.notes+'</div>':'')+'</div><div class="tla" style="color:'+g.color+'">'+R(inst.amount)+'<span style="font-size:11px;font-weight:400;color:var(--mt)">/mes</span></div></div><div class="tlmonths">'+tms+'</div>'+(gid==='parcelas'?'<div style="text-align:right;margin-top:6px"><button class="bs be" onclick="window.openInstEdit(\''+inst.id+'\')">Editar</button></div>':'')+'</div>';
    }).join('');
    return'<div class="sec">'+ism(gid,g.color)+' '+label+'</div>'+rows;
  }
  return summary+rGrp('Carro',carroInst,'carro')+rGrp('Parcelas Cartao',cardInst,'parcelas');
}

function rGrpBtns(pfx,sel){
  return GR.map(function(g){var on=g.id===sel;return'<button class="tb'+(on?' on':'')+'" data-g="'+g.id+'" data-pfx="'+pfx+'" style="background:'+(on?g.color:'')+';color:'+(on?'#fff':'')+'" onclick="window.selGrp(\''+g.id+'\',\''+pfx+'\')">'+(ICO[g.id]||ICO.outros)+' '+g.label+'</button>';}).join('');
}

function rAddForm(){
  return'<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><span class="ftit">Novo lancamento</span></div><div class="g2"><div><label class="fl">Valor (R$)</label><input class="fi" id="fa-a" type="number" placeholder="0,00" inputmode="decimal" style="font-family:monospace;font-size:18px;font-weight:700"></div><div><label class="fl">Data</label><input class="fi" id="fa-d" type="date" value="'+tod()+'"></div></div><div class="fg"><label class="fl">Categoria</label><div class="tg">'+rGrpBtns('ag',U.sel)+'</div></div><div class="fg"><label class="fl">Descricao / estabelecimento</label><input class="fi" id="fa-dc" type="text" placeholder="Ex: Shell, Carrefour, Netflix..."></div><div class="fg" style="margin-bottom:20px"><label class="fl">Observacao (opcional)</label><input class="fi" id="fa-nt" type="text" placeholder="Ex: parcela 2/6, semana 1..."></div><button class="bgrn" onclick="window.addExp()">Adicionar lancamento</button><button class="bgh" onclick="window.goMain()">Cancelar</button></div>';
}

function rEditForm(){
  var exp=D.expenses.find(function(e){return e.id===U.eid;});if(!exp)return'';
  var sg=U.sel||exp.group;
  return'<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><div><div class="ftit">Editar lancamento</div><div class="fsub">'+new Date(exp.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})+'</div></div></div><div class="g2"><div><label class="fl">Valor (R$)</label><input class="fi" id="fe-a" type="number" value="'+exp.amount+'" inputmode="decimal" style="font-family:monospace;font-size:18px;font-weight:700"></div><div><label class="fl">Data</label><input class="fi" id="fe-d" type="date" value="'+exp.date+'"></div></div><div class="fg"><label class="fl">Categoria</label><div class="tg">'+rGrpBtns('eg',sg)+'</div></div><div class="fg"><label class="fl">Descricao</label><input class="fi" id="fe-dc" type="text" value="'+(exp.description||'')+'"></div><div class="fg" style="margin-bottom:20px"><label class="fl">Observacao</label><input class="fi" id="fe-nt" type="text" value="'+(exp.note||'')+'"></div><button class="bblu" onclick="window.saveEdit()">Salvar alteracoes</button><button class="bgh" onclick="window.goMain()">Cancelar</button></div>';
}

function rPlanEdit(){
  var id=U.planEd;var m=U.month;
  var items=getPlanned(m);var item=items.find(function(i){return i.id===id;});if(!item)return'';
  var g=gBy(item.group);
  var isFixed=D.fixedItems.some(function(i){return i.id===id;});
  var hasOv=!!(D.monthOverrides[m]&&D.monthOverrides[m][id]);
  var defAmt=D.fixedItems.find(function(i){return i.id===id;});defAmt=defAmt?defAmt.amount:undefined;
  return'<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><div><div class="ftit">Editar previsao</div><div class="fsub">'+mLbl(m)+'</div></div></div><div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border-radius:10px;margin-bottom:20px">'+ibadge(g,26)+'<div><div style="font-size:15px;font-weight:600">'+item.label+'</div><div style="font-size:12px;color:var(--mt)">'+g.label+(hasOv?' · Valor modificado para este mes':' · Valor padrao')+'</div></div></div><div class="fg" style="margin-bottom:20px"><label class="fl">Valor previsto (R$)</label><input class="fi" id="pe-a" type="number" value="'+item.amount+'" inputmode="decimal" style="font-family:monospace;font-size:20px;font-weight:700"><div style="font-size:12px;color:var(--mt);margin-top:6px">'+(isFixed&&defAmt!==undefined?'Padrao: '+R(defAmt)+'. Vale so para '+mLbl(m)+'.':'Item extra deste mes.')+'</div></div>'+(hasOv?'<button class="bred" onclick="window.resetPlan(\''+id+'\')">Restaurar valor padrao ('+R(defAmt)+')</button>':'')+'<button class="bblu" onclick="window.savePlan(\''+id+'\')">Salvar para '+mLbl(m).split(' ')[0]+'</button><button class="bgh" onclick="window.goMain()">Cancelar</button></div>';
}

function rInstEdit(){
  var id=U.planEd;
  var inst=D.installments.find(function(i){return i.id===id;});if(!inst)return'';
  var g=gBy(inst.group);
  return'<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><div><div class="ftit">Editar parcela</div><div class="fsub">'+inst.label+'</div></div></div><div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s2);border-radius:10px;margin-bottom:20px">'+ibadge(g,26)+'<div><div style="font-size:15px;font-weight:600">'+inst.label+'</div><div style="font-size:12px;color:var(--mt)">'+(inst.notes||g.label)+'</div></div></div><div class="g2"><div><label class="fl">Valor mensal (R$)</label><input class="fi" id="ie-a" type="number" value="'+inst.amount+'" inputmode="decimal" style="font-family:monospace;font-size:18px;font-weight:700"></div><div><label class="fl">Ultima parcela</label><input class="fi" id="ie-e" type="month" value="'+(inst.end||'')+'" placeholder="Sem fim definido"></div></div><div class="fg" style="margin-bottom:20px"><label class="fl">Observacao</label><input class="fi" id="ie-n" type="text" value="'+(inst.notes||'')+'"></div><button class="bblu" onclick="window.saveInst(\''+id+'\')">Salvar parcela</button><button class="bgh" onclick="window.goMain()">Cancelar</button></div>';
}

function rConfig(){
  var sal=D.config.salaries;var tetos=D.config.tetos;var tgt=D.config.targetSavings;
  var tot=sal.reduce(function(s,x){return s+x.amount;},0);
  var acc='<div class="sec">Conta</div><div class="card"><div class="cfgr"><div class="cfgl"><div class="cfgn">Sincronização Ativa</div><div class="cfgs">Acesso com e-mail protegido</div></div><button class="bgh" style="width:auto;margin:0;padding:6px 14px" onclick="window.logout()">Sair</button></div></div>';
  return'<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.goMain()">&#8592; Voltar</button><span class="ftit">Configuracoes</span></div>'+acc+'<div class="sec">Salario</div><div class="card">'+sal.map(function(s,i){return'<div class="cfgr"><div class="cfgl"><div class="cfgn">'+s.label+'</div></div><input class="cfgi" type="number" id="sal-'+i+'" value="'+s.amount+'" onblur="window.saveSal('+i+',this.value)"></div>';}).join('')+'<div class="cfgr"><div class="cfgl"><div class="cfgn" style="font-weight:700">Total</div></div><span style="font-family:monospace;font-weight:700;font-size:15px;color:var(--grn)">'+R(tot)+'</span></div></div><div class="sec">Tetos variaveis</div><div class="card"><div class="cfgr"><div class="cfgl"><div class="cfgn">Mercado</div><div class="cfgs">Meta maxima mensal</div></div><input class="cfgi" type="number" id="tt-m" value="'+tetos.mercado+'" onblur="window.saveTeto(\'mercado\',this.value)"></div><div class="cfgr"><div class="cfgl"><div class="cfgn">Lanches e Saidas</div><div class="cfgs">Meta maxima mensal</div></div><input class="cfgi" type="number" id="tt-l" value="'+tetos.lanches+'" onblur="window.saveTeto(\'lanches\',this.value)"></div></div><div class="sec">Meta de economia</div><div class="card"><div class="cfgr"><div class="cfgl"><div class="cfgn">Sobra minima desejada</div><div class="cfgs">Teto geral = '+R(tot)+' menos meta = '+R(tot-tgt)+'</div></div><input class="cfgi" type="number" id="ts-s" value="'+tgt+'" onblur="window.saveTargetS(this.value)"></div></div><button class="bgh" onclick="window.goMain()">Voltar ao app</button></div>';
}

window.shiftMon=function(d){U.month=shM(U.month,d);render();};
window.setTab=function(t){U.tab=t;U.del=null;render();};
window.setFilter=function(f){U.filter=f;render();};
window.openAdd=function(){U.scr='add';U.sel='outros';render();};
window.openConfig=function(){U.scr='config';render();};
window.goMain=function(){U.scr='main';U.del=null;U.eid=null;U.planEd=null;U.sel='outros';render();};

window.selGrp=function(id,pfx){
  U.sel=id;
  document.querySelectorAll('[data-pfx="'+pfx+'"]').forEach(function(b){
    var g=gBy(b.dataset.g),on=b.dataset.g===id;
    b.classList.toggle('on',on);b.style.background=on?g.color:'';b.style.color=on?'#fff':'';
  });
};

window.qeSub=function(){
  var inp=document.getElementById('qei');
  U.qe=inp?inp.value:U.qe;
  U.parsed=U.qe.trim()?parseQEtxt(U.qe):null;
  if(!U.parsed)return;
  render();
};
window.qeSetG=function(id){
  if(!U.parsed)return;U.parsed.group=id;
  var area=document.getElementById('qepa');
  if(area)area.innerHTML='<div class="qep">'+rQEPI()+'</div>';
};
window.qeConfirm=function(){
  if(!U.parsed)return;
  var p=U.parsed;
  D.expenses=[{id:uid(),date:p.date,amount:p.amount,group:p.group,description:p.description,note:'',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}].concat(D.expenses);
  U.qe='';U.parsed=null;sset(D);render();
  setTimeout(function(){var inp=document.getElementById('qei');if(inp)inp.focus();},80);
};
window.qeCancel=function(){U.qe='';U.parsed=null;render();};

window.addExp=function(){
  var amt=pn(document.getElementById('fa-a').value);
  if(!amt){document.getElementById('fa-a').focus();return;}
  D.expenses=[{id:uid(),date:document.getElementById('fa-d').value||tod(),amount:amt,group:U.sel,
    description:document.getElementById('fa-dc').value.trim(),note:document.getElementById('fa-nt').value.trim(),
    createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}].concat(D.expenses);
  sset(D);window.goMain();
};

window.openEdit=function(id){
  U.eid=id;var e=D.expenses.find(function(x){return x.id===id;});if(e)U.sel=e.group;U.scr='edit';render();
};
window.saveEdit=function(){
  var amt=pn(document.getElementById('fe-a').value);
  if(!amt){document.getElementById('fe-a').focus();return;}
  D.expenses=D.expenses.map(function(e){
    if(e.id!==U.eid)return e;
    return Object.assign({},e,{date:document.getElementById('fe-d').value||e.date,amount:amt,group:U.sel,
      description:document.getElementById('fe-dc').value.trim(),note:document.getElementById('fe-nt').value.trim(),
      updatedAt:new Date().toISOString()});
  });
  sset(D);window.goMain();
};

window.delC=function(id){U.del=id;render();};
window.delX=function(){U.del=null;render();};
window.delDo=function(id){D.expenses=D.expenses.filter(function(e){return e.id!==id;});U.del=null;sset(D);render();};

window.openPlanEdit=function(id){U.planEd=id;U.scr='planEdit';render();};
window.openInstEdit=function(id){U.planEd=id;U.scr='instEdit';render();};

window.savePlan=function(id){
  var amt=pn(document.getElementById('pe-a').value);if(!amt)return;
  var m=U.month;var isFixed=D.fixedItems.some(function(i){return i.id===id;});
  if(isFixed){if(!D.monthOverrides[m])D.monthOverrides[m]={};D.monthOverrides[m][id]={amount:amt};}
  else{var ex=D.monthExtras[m]||[];var idx=ex.findIndex(function(i){return i.id===id;});if(idx>=0)ex[idx].amount=amt;D.monthExtras[m]=ex;}
  sset(D);window.goMain();
};
window.resetPlan=function(id){
  var m=U.month;if(D.monthOverrides[m])delete D.monthOverrides[m][id];sset(D);window.goMain();
};
window.saveInst=function(id){
  var amt=pn(document.getElementById('ie-a').value);if(!amt)return;
  var endVal=document.getElementById('ie-e').value.trim();
  var notes=document.getElementById('ie-n').value.trim();
  D.installments=D.installments.map(function(i){return i.id!==id?i:Object.assign({},i,{amount:amt,end:endVal||null,notes:notes});});
  sset(D);window.goMain();
};

window.saveSal=function(i,v){var amt=pn(v);if(amt){D.config.salaries[i].amount=amt;sset(D);}};
window.saveTeto=function(k,v){var amt=pn(v);if(amt){D.config.tetos[k]=amt;sset(D);}};
window.saveTargetS=function(v){var amt=pn(v);if(amt){D.config.targetSavings=amt;sset(D);}};

</script>
</body>
</html>
