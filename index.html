function rStats() {
  var m = U.month;
  var stCur = stats(m);

  // Build monthly history (last 6 months)
  var candidateMs = [];
  for(var i=11; i>=0; i--) candidateMs.push(shM(m, -i));
  var activeMs = candidateMs.filter(function(mo){ return getExp(mo).length > 0 || mo === m; });
  if(activeMs.indexOf(m) === -1) activeMs.push(m);
  activeMs = activeMs.slice(-6);

  var totalSav = 0; var activeCnt = 0;
  var chartData = activeMs.map(function(mo) {
    var s = (mo === m) ? stCur : stats(mo);
    var hasData = getExp(mo).length > 0;
    if(hasData){ totalSav += s.realSav; activeCnt++; }
    return { m: mo, sal: s.sal, c: s.committed, sav: s.realSav, hasData: hasData };
  });
  var avgSav = activeCnt > 0 ? totalSav / activeCnt : 0;

  // Comparison vs previous month
  var prevM = shM(m, -1);
  var stPrev = stats(prevM);
  var varPct = stPrev.gastoReal > 0 ? Math.round(((stCur.gastoReal - stPrev.gastoReal) / stPrev.gastoReal) * 100) : null;

  // ── Score de saúde financeira ──────────────────────────────
  var score = calcFinanceScore(stCur, D.config.targetSavings);
  var sl = scoreLabel(score);
  var insights = buildInsights(stCur, stPrev, m);

  // Gauge SVG
  var gaugeR = 44, gaugeCx = 52, gaugeCy = 52;
  var circ = 2 * Math.PI * gaugeR;
  var fill = (score / 100) * circ;
  var gaugeSVG = '<svg width="104" height="104" viewBox="0 0 104 104" style="flex-shrink:0">'
    + '<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="var(--bd)" stroke-width="10"/>'
    + '<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="'+sl.color+'" stroke-width="10"'
    + ' stroke-dasharray="'+fill.toFixed(1)+' '+(circ-fill).toFixed(1)+'"'

        +(topDayDate2?'<div style="text-align:right;font-size:11px;color:var(--mt);flex-shrink:0;margin-left:12px">Pico do mês<br><span style="font-family:monospace;font-size:13px;font-weight:700;color:var(--red)">'+topDayDate2+'&nbsp;'+R(topDayAmt)+'</span></div>':'')

  // ── Layout final: evolução → linha do mês → balanço (destaque) → KPIs → dias → categoria → metas → resumo ──

      +'<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:14px">Dias de maior gasto — '+mLbl(m).split(' ')[0]+'</div>'

    +'</div>'

    +'</div>'

    +'</div>'
  +'</div>';
}



function rBalanco(m, st, score, sl, insights) {
  // Defaults para quando chamado sem score (retrocompatibilidade)
  score = score || 0;
  sl = sl || {label:'—', color:'var(--mt)'};
  insights = insights || [];
  var gaugeR=34, gaugeCx=40, gaugeCy=40;
  var gCirc=2*Math.PI*gaugeR, gFill=(score/100)*gCirc;
  var gaugeSVG='<svg width="80" height="80" viewBox="0 0 80 80" style="flex-shrink:0">'
    +'<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="var(--bd)" stroke-width="8"/>'
    +'<circle cx="'+gaugeCx+'" cy="'+gaugeCy+'" r="'+gaugeR+'" fill="none" stroke="'+sl.color+'" stroke-width="8"'
    +' stroke-dasharray="'+gFill.toFixed(1)+' '+(gCirc-gFill).toFixed(1)+'"'
    +' stroke-dashoffset="'+(gCirc/4).toFixed(1)+'" transform="rotate(-90 '+gaugeCx+' '+gaugeCy+')" stroke-linecap="round"/>'
    +'<text x="'+gaugeCx+'" y="'+(gaugeCy-3)+'" text-anchor="middle" font-size="16" font-weight="900" fill="'+sl.color+'" font-family="DM Mono,monospace">'+score+'</text>'
    +'<text x="'+gaugeCx+'" y="'+(gaugeCy+11)+'" text-anchor="middle" font-size="8" fill="var(--mt)" font-family="Plus Jakarta Sans,sans-serif">/100</text>'
  +'</svg>';
  var insightsHTML = insights.length
    ? insights.map(function(ins){
        return '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)">'
          +'<span style="font-size:14px;flex-shrink:0">'+ins.ico+'</span>'
          +'<span style="font-size:12px;color:var(--txt);line-height:1.45">'+ins.txt+'</span>'
        +'</div>';
      }).join('')
    : '';
  var sal = st.sal;
  var gasto = st.gastoReal;
  var sobra = sal - gasto;
  var taxaPoupanca = sal > 0 ? ((sobra / sal) * 100).toFixed(1) : 0;
  var taxaGasto = sal > 0 ? ((gasto / sal) * 100).toFixed(1) : 0;

  // Alertas automáticos
  var alertas = [];
  GR.forEach(function(g){
    var c = st.cats[g.id];
    if(!c) return;
    if(c.p > 0 && c.s > c.p) alertas.push({type:'over', msg:'<b>'+g.label+'</b>: gastou '+R(c.s)+' de '+R(c.p)+' previsto (+'+(((c.s-c.p)/c.p)*100).toFixed(0)+'%)', color:'var(--red)'});
    else if(c.p > 0 && c.s > c.p * 0.85) alertas.push({type:'warn', msg:'<b>'+g.label+'</b>: '+R(c.s)+' de '+R(c.p)+' ('+((c.s/c.p)*100).toFixed(0)+'% do limite)', color:'var(--amb)'});
  });
  if(sal > 0 && parseFloat(taxaPoupanca) < 10) alertas.push({type:'warn', msg:'Taxa de poupança abaixo de 10% do salário.', color:'var(--amb)'});
  if(sal > 0 && gasto > sal) alertas.push({type:'over', msg:'Gasto real ultrapassou a receita mensal em '+R(gasto-sal)+'.', color:'var(--red)'});

  var alertHTML = alertas.length
    ? alertas.map(function(a){return'<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:8px;background:'+a.color+'18;border-left:3px solid '+a.color+';margin-bottom:6px;font-size:13px;color:var(--txt);line-height:1.4">'+a.msg+'</div>';}).join('')
    : '<div style="font-size:13px;color:var(--grn);padding:8px 0">✅ Nenhum alerta para este mês.</div>';

  // Barras de composição do orçamento
  var bars = [
    {label:'Invariáveis', val:st.invTotal, color:'var(--grn)'},
    {label:'Parcelas', val:st.parcTotal, color:'var(--pur)'},
    {label:'Avulsos', val:st.expTotal, color:'var(--blu)'},
  ].filter(function(b){return b.val > 0;});
  var barsHTML = bars.map(function(b){
    var pct = gasto > 0 ? Math.round((b.val/gasto)*100) : 0;
    var pctSal = sal > 0 ? Math.round((b.val/sal)*100) : 0;
    return '<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        +'<span style="font-size:12px;font-weight:600;color:var(--txt)">'+b.label+'</span>'
        +'<span style="font-size:12px;color:var(--mt)">'+R(b.val)+' · '+pctSal+'% da receita</span>'
      +'</div>'
      +'<div style="height:7px;background:var(--s3);border-radius:4px;overflow:hidden">'
        +'<div style="height:100%;width:'+pct+'%;background:'+b.color+';border-radius:4px"></div>'
      +'</div>'
    +'</div>';
  }).join('');

  return '<div class="card" style="margin-bottom:16px;border-top:3px solid '+(parseFloat(taxaPoupanca)>=10?'var(--grn)':parseFloat(taxaPoupanca)>=5?'var(--amb)':'var(--red)')+'">'
    +'<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:14px">💰 Balanço Financeiro</div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bd)">'
      +gaugeSVG
      +'<div style="flex:1">'
        +'<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Saúde financeira</div>'
        +'<div style="font-size:20px;font-weight:900;color:'+sl.color+';letter-spacing:-.02em">'+sl.label+'</div>'
        +'<div style="font-size:12px;color:var(--mt);margin-top:3px">Poupança: <b>'+taxaPoupanca+'%</b> · Comprometimento: <b>'+taxaGasto+'%</b></div>'
      +'</div>'
    +'</div>'
    +(insightsHTML?'<div style="margin-bottom:14px">'+insightsHTML+'</div>':'')
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
      +'<div style="background:var(--s2);border-radius:10px;padding:12px">'
        +'<div style="font-size:11px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Taxa de poupança</div>'
        +'<div style="font-size:22px;font-weight:800;color:'+(parseFloat(taxaPoupanca)>=10?'var(--grn)':'var(--red)')+'">'+taxaPoupanca+'%</div>'
        +'<div style="font-size:11px;color:var(--mt2);margin-top:2px">'+R(sobra)+' sobrando</div>'
      +'</div>'
      +'<div style="background:var(--s2);border-radius:10px;padding:12px">'
        +'<div style="font-size:11px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Comprometimento</div>'
        +'<div style="font-size:22px;font-weight:800;color:'+(parseFloat(taxaGasto)>90?'var(--red)':parseFloat(taxaGasto)>75?'var(--amb)':'var(--txt)')+'">'+taxaGasto+'%</div>'
        +'<div style="font-size:11px;color:var(--mt2);margin-top:2px">da receita em gastos</div>'
      +'</div>'
    +'</div>'
    +(barsHTML?'<div style="margin-bottom:14px">'+barsHTML+'</div>':'')
    +'<div style="font-size:12px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Alertas</div>'
    +alertHTML
    +'<button onclick="window.openBalanceModal(window._bmStCur,window._bmStPrev,window._bmM,window._bmScore,window._bmSl)" style="width:100%;margin-top:14px;padding:10px;background:var(--s2);border:none;border-radius:10px;font-size:13px;font-weight:700;color:var(--mt);cursor:pointer;font-family:inherit">📊 Ver análise completa</button>'
  +'</div>';
}


// Detecta se o app está rodando em modo instalado (standalone/PWA)
function _isAppInstalled(){
  return !!(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
         !!(window.navigator && window.navigator.standalone === true);
}
var _INSTALL_DONE_KEY = '_poupai_install_done';
function _installDismissed(){ try{ return localStorage.getItem(_INSTALL_DONE_KEY)==='1'; }catch(e){ return false; } }
function _markInstallDone(){ try{ localStorage.setItem(_INSTALL_DONE_KEY,'1'); }catch(e){} }
function _shouldShowInstallNotif(){
  return !_isAppInstalled() && !_installDismissed();
}

window.openNotifications = function(){
  var existing = document.getElementById('notif-overlay');
  if(existing){ existing.remove(); return; }

  var overlay = document.createElement('div');
  overlay.id = 'notif-overlay';
  overlay.className = 'notif-overlay';
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.remove(); });

  var showInstall = _shouldShowInstallNotif();
  var os = 'android';

  function render(){
    var installBlock = '';
    if(showInstall){
      var stepsAndroid = [
        {t:'Abra o PoupAí no <b>Chrome</b> no Android'},
        {t:'Toque nos três pontinhos <b>⋮</b> no canto superior direito'},
        {t:'Selecione <b>"Adicionar à tela inicial"</b>'},
        {t:'Confirme tocando em <b>Adicionar</b> — pronto! 🎉'},
      ];
      var stepsIos = [
        {t:'Abra o PoupAí no <b>Safari</b> no iPhone'},
        {t:'Toque no botão de <b>Compartilhar</b> (retângulo com seta para cima)'},
        {t:'Role a lista e toque em <b>"Adicionar à Tela Inicial"</b>'},
        {t:'Toque em <b>Adicionar</b> — pronto! 🎉'},
      ];
      var steps = os==='android' ? stepsAndroid : stepsIos;
      installBlock =
        '<div class="notif-item" style="cursor:default">'
          +'<div style="display:flex;gap:12px;align-items:flex-start">'
            +'<span class="notif-item-ico">📲</span>'
            +'<div class="notif-item-body">'
              +'<div class="notif-item-title">Sabia que você pode instalar o PoupAí?</div>'
              +'<div class="notif-item-sub">Acesse direto da tela inicial do celular, sem abrir o browser. Funciona mesmo sem internet.</div>'
            +'</div>'
          +'</div>'
          +'<div style="display:flex;gap:8px;margin-top:14px">'
            +'<button onclick="window._notifSetOs(\'android\')" id="notif-btn-android" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:'+(os==='android'?'var(--grn)':'var(--s2)')+';color:'+(os==='android'?'#fff':'var(--mt)')+';border:1px solid '+(os==='android'?'var(--grn)':'var(--bd)')+'">🤖 Android</button>'
            +'<button onclick="window._notifSetOs(\'ios\')" id="notif-btn-ios" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:'+(os==='ios'?'var(--grn)':'var(--s2)')+';color:'+(os==='ios'?'#fff':'var(--mt)')+';border:1px solid '+(os==='ios'?'var(--grn)':'var(--bd)')+'">🍎 iPhone</button>'
          +'</div>'
        +'</div>'
        +'<div class="install-steps">'
          +steps.map(function(s,i){
            return '<div class="install-step">'
              +'<div class="install-step-num">'+(i+1)+'</div>'
              +'<div class="install-step-txt">'+s.t+'</div>'
            +'</div>';
          }).join('')
        +'</div>'
        +'<div style="padding:12px 18px 16px">'
          +'<button onclick="window._notifMarkInstalled()" style="width:100%;padding:10px;border-radius:10px;background:var(--grn);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer">✅ Já instalei e estou usando</button>'
        +'</div>';
    } else {
      installBlock =
        '<div class="notif-item" style="cursor:default">'
          +'<div style="display:flex;gap:12px;align-items:center">'
            +'<span class="notif-item-ico">✅</span>'
            +'<div class="notif-item-body">'
              +'<div class="notif-item-title">App instalado</div>'
              +'<div class="notif-item-sub">Você já está usando o PoupAí instalado. Aproveite!</div>'
            +'</div>'
          +'</div>'
        +'</div>';
    }
    var badgeHtml = showInstall ? '<span class="notif-badge">1</span>' : '';
    overlay.innerHTML =
      '<div class="notif-modal">'
        +'<div class="notif-hdr">'
          +'<span class="notif-title">🔔 Avisos '+badgeHtml+'</span>'
          +'<button class="cat-modal-close" onclick="document.getElementById(\'notif-overlay\').remove()" title="Fechar">✕</button>'
        +'</div>'
        +installBlock
      +'</div>';
  }

  window._notifSetOs = function(newOs){ os = newOs; render(); };

  window._notifMarkInstalled = function(){
    _markInstallDone();
    showInstall = false;
    render();
  };

  render();
  document.body.appendChild(overlay);
}

window.togglePrevCat = function(id){
  if(!U.prevOpenCats) U.prevOpenCats = {};
  U.prevOpenCats[id] = !U.prevOpenCats[id];
  // Anima sem re-render completo (mais suave)
  var body = document.getElementById('prev-body-'+id);
  var hdr  = document.getElementById('prev-hdr-'+id);
  if(body && hdr){
    var isOpen = U.prevOpenCats[id];
    body.className = 'prev-cat-body ' + (isOpen ? 'open' : 'closed');
    hdr.className  = 'prev-cat-hdr '  + (isOpen ? 'open' : '');
  }
};


window.openPrevCatModal = function(gid){
  var m = U.month;
  var g = gBy(gid);
  var items = getPlanned(m);
  var gi = items.filter(function(i){ return !i.isParcela && i.group === gid; });
  var ginst = items.filter(function(i){ return i.isParcela && i.group === gid; });
  var all = gi.concat(ginst);
  var gtot = all.reduce(function(s,i){ return s+i.amount; }, 0);
  var isBulk = !!U.bulkMode;

  function buildRows(){
    if(!all.length) return '<div style="font-size:13px;color:var(--mt2);padding:16px 0">Nenhum item nesta categoria.</div>';
    return all.map(function(item){
      var orig = D.fixedItems.find(function(f){return f.id===item.id;}) || item;
      var due = orig.dueDay ? dueBadge(orig.dueDay, m) : '';
      var noteTxt = orig.notes ? '<div style="font-size:11px;color:var(--mt2);margin-top:2px">'+orig.notes+'</div>' : '';
      var typTag = !isEst(orig) ? '<span class="pitag" style="background:var(--grn-l);color:var(--grn-d)">fixo</span>' : '';
      var instTag = item.isParcela ? '<span class="pitag" style="background:var(--pur-l);color:var(--pur)">parcela</span>' : '';
      if(isBulk && !item.isParcela){
        // Modo bulk: mostra checkbox em vez de link de edição
        var isChecked = !!(U.bulkSel && U.bulkSel[item.id]);
        return '<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--bd);cursor:pointer" onclick="window._prevBulkToggle(\''+item.id+'\')">'
          +'<input type="checkbox" id="bulk-chk-'+item.id+'" '+(isChecked?'checked':'')+' onclick="event.stopPropagation();window._prevBulkToggle(\''+item.id+'\')" style="width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--blu)">'
          +'<div style="min-width:0;flex:1">'
            +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:14px;font-weight:600;color:var(--txt)">'+item.label+typTag+instTag+due+'</div>'
            +noteTxt
          +'</div>'
          +'<span style="font-family:\'DM Mono\',monospace;font-size:14px;font-weight:700;color:'+g.color+';flex-shrink:0">'+R(item.amount)+'</span>'
        +'</div>';
      }
      var editFn = item.isParcela ? 'window.openInstEdit' : 'window.openPlanEdit';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-top:1px solid var(--bd)">'
        +'<div style="min-width:0;flex:1">'
          +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:14px;font-weight:600;color:var(--txt)">'+item.label+typTag+instTag+due+'</div>'
          +noteTxt
        +'</div>'
        +'<span onclick="window.closePrevCatModal();'+editFn+'(\''+item.id+'\')" style="font-family:\'DM Mono\',monospace;font-size:14px;font-weight:700;color:'+g.color+';cursor:pointer;margin-left:14px;flex-shrink:0;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s" onmouseover="this.style.textDecorationColor=\''+g.color+'\'" onmouseout="this.style.textDecorationColor=\'transparent\'">'+R(item.amount)+'</span>'
      +'</div>';
    }).join('');
  }

  // Barra de ações para o modo bulk, exibida dentro do modal
  function buildBulkBar(){
    if(!isBulk) return '';
    var selCount = Object.keys(U.bulkSel||{}).filter(function(k){ return U.bulkSel[k]; }).length;
    return '<div id="prev-modal-bulk-bar" style="background:var(--blu-l);border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +'<span id="prev-modal-bulk-count" style="font-size:13px;font-weight:600;color:var(--blu-d);flex:1">'+selCount+' selecionado(s)</span>'
      +'<button class="bs be" onclick="window._prevBulkApply(false)">Marcar como Invariável</button>'
      +'<button class="bs" style="background:var(--blu-l);color:var(--blu-d)" onclick="window._prevBulkApply(true)">Marcar como Estimativa</button>'
      +'<button class="bs bdl" onclick="window.bulkDeleteSelected()">🗑 Apagar selecionadas</button>'
    +'</div>';
  }

  function buildModal(){
    return '<div class="cat-overlay" id="prev-cat-overlay" onclick="if(event.target===this)window.closePrevCatModal()">'
      +'<div class="cat-modal">'
        +'<div class="cat-modal-hdr">'
          +'<div style="display:flex;align-items:center;gap:12px">'+ibadge(g,40)
            +'<div><div style="font-size:18px;font-weight:700;letter-spacing:-0.02em">'+g.label+'</div>'
            +'<div style="font-size:12px;color:var(--mt);margin-top:2px">'+all.length+' item'+(all.length!==1?'s':'')+(isBulk?' · modo seleção':'')+'</div></div>'
          +'</div>'
          +'<button class="cat-modal-close" onclick="window.closePrevCatModal()">&#10005;</button>'
        +'</div>'
        +'<div class="cat-modal-body">'
          +(isBulk
            ? buildBulkBar()
            : '<div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:800;color:'+g.color+';margin-bottom:3px">'+R(gtot)+'</div>'
             +'<div style="font-size:11px;color:var(--mt);margin-bottom:16px">previsto neste mês · toque no valor para editar</div>')
          +buildRows()
          +(!isBulk ? '<button class="bgrn" style="margin-top:18px;width:100%" onclick="window.closePrevCatModal();window.openAddPlan(\''+gid+'\')">+ Adicionar item em '+g.label+'</button>' : '')
        +'</div>'
      +'</div>'
    +'</div>';
  }

  var el = document.createElement('div');
  el.innerHTML = buildModal();
  document.body.appendChild(el.firstChild);

  // Helpers do bulk mode dentro do modal
  window._prevBulkToggle = function(id){
    if(!U.bulkSel) U.bulkSel = {};
    U.bulkSel[id] = !U.bulkSel[id];
    // Atualiza checkbox diretamente sem re-renderizar o modal inteiro
    var chk = document.getElementById('bulk-chk-'+id);
    if(chk) chk.checked = !!U.bulkSel[id];
    var countEl = document.getElementById('prev-modal-bulk-count');
    var sel = Object.keys(U.bulkSel).filter(function(k){ return U.bulkSel[k]; });
    if(countEl) countEl.textContent = sel.length+' selecionado(s)';
    // Atualiza o contador do bulk-bar externo se visível
    var extCount = document.getElementById('bulk-count');
    if(extCount) extCount.textContent = sel.length+' selecionado(s)';
  };

  }).join('');
  var tot=filt.reduce(function(s,e){return s+e.amount;},0);

function rCalendar() {
  var m = U.month;
  var year = parseInt(m.split('-')[0]);
  var month = parseInt(m.split('-')[1]) - 1;
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var todayStr = tod();
  
  var exps = getExp(m);
  var expByDay = {};
  exps.forEach(function(e) {
    var d = parseInt(e.date.split('-')[2], 10);
    if(!expByDay[d]) expByDay[d] = [];
    expByDay[d].push(e);
  });
  
  var html = '<div class="fs" style="max-width:800px"><div class="fhdr"><button class="fbk" onclick="window.backOrClose()">&#8592; Voltar</button><div><div class="ftit">Calendário mensal</div><div class="fsub">' + mLbl(m) + '</div></div></div>';
  html += '<div class="notice">Clique em um dia para ver os lançamentos detalhados na aba de Gastos.</div>';
  html += '<div class="cal-wrap"><table class="cal"><thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead><tbody><tr>';
  
  var dayCount = 1;
  for (var i = 0; i < 42; i++) {
    if (i % 7 === 0 && i > 0) html += '</tr><tr>';
    if (i < firstDay || dayCount > daysInMonth) {
      html += '<td class="off"></td>';
    } else {
      var dStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(dayCount).padStart(2,'0');
      var isToday = (dStr === todayStr);
      var dayClass = isToday ? 'cal-day today' : 'cal-day';
      var iconsHtml = '';
      if(expByDay[dayCount]) {
        var groups = [];
        expByDay[dayCount].forEach(function(e) { if(groups.indexOf(e.group)===-1) groups.push(e.group); });
        iconsHtml = '<div class="cal-icons">' + groups.map(function(gid) {
          var g = gBy(gid);
          return '<span class="cal-ico" style="background:'+g.color+'22;color:'+g.color+'" title="'+g.label+'">' + (ICO[g.id]||ICO.outros) + '</span>';
        }).join('') + '</div>';
      }
      html += '<td onclick="window.filterByDate(\''+dStr+'\')"><span class="'+dayClass+'">'+dayCount+'</span>'+iconsHtml+'</td>';
      dayCount++;
    }
    if (dayCount > daysInMonth && i % 7 === 6) break; 
  }
  html += '</tbody></table></div></div>';
  return html;
}

function rGastosMes(){
  var m = U.month;
  var st = stats(m);
  var planned = getPlanned(m);
  var exps = getExp(m);

  var totalGeral = 0;
  var blocos = GR.map(function(g){
    var plannedItems = planned.filter(function(i){ return i.group === g.id; });
    var expItems     = exps.filter(function(e){ return e.group === g.id; });
    var cat          = st.cats[g.id];
    var committed    = cat ? cat.c : 0;
    if(!committed && !plannedItems.length && !expItems.length) return '';
    totalGeral += committed;

    var sumExp    = cat ? cat.s : 0;
    var sumPlanned= cat ? cat.p : 0;
    var overBudget= sumExp > sumPlanned && sumPlanned > 0;

    var rows = '';

    if(expItems.length){
      if(plannedItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px">Realizado</div>';
      expItems.forEach(function(e){
        var dl = new Date(e.date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        rows += '<div class="pi"><div class="pin">'+(e.description||g.label)
          +'<span class="pitag" style="background:'+g.color+'18;color:'+g.color+'">'+dl+'</span></div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:700;color:'+g.color+'">'+R(e.amount)+'</span></div>';
      });
    }

    if(plannedItems.length){
      if(expItems.length)
        rows += '<div style="font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.06em;padding:6px 0 3px;margin-top:4px;border-top:1px solid var(--bd)">Previsto/Fixo</div>';
      plannedItems.forEach(function(i){
        var typeTag = !isEst(i)
          ? '<span class="pitag" style="background:#f0fdf4;color:var(--grn)">invariável</span>'
          : i.isParcela
            ? '<span class="pitag" style="background:var(--pur-l);color:var(--pur)">parcela</span>'
            : i.isExtra
              ? '<span class="pitag" style="background:var(--amb-l);color:var(--amb)">extra</span>'
              : '<span class="pitag" style="background:var(--s2);color:var(--mt)">estimativa</span>';
        rows += '<div class="pi"><div class="pin">'+i.label+typeTag+'</div>'
          +'<span style="font-family:monospace;font-size:13px;font-weight:600;color:'+(overBudget?'var(--mt2)':'var(--mt)')+'">'+R(i.amount)+'</span></div>';
      });
      if(overBudget)
        rows += '<div style="font-size:11px;color:var(--amb);padding:4px 0">Realizado supera o planejado</div>';
    }

    var headerRight = sumExp > 0 && sumExp !== committed
      ? '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--red)':g.color)+'">'+R(sumExp)+'</div><div style="font-family:monospace;font-size:11px;color:var(--mt2)">teto: '+R(committed)+'</div></div>'
      : '<div style="text-align:right"><div style="font-family:monospace;font-size:13px;font-weight:700;color:'+(overBudget?'var(--amb)':g.color)+'">'+R(committed)+'</div></div>';
    return '<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)">'
        +'<div style="display:flex;align-items:center;gap:8px">'+ibadge(g,26)
          +'<span style="font-size:14px;font-weight:700">'+g.label+'</span></div>'
        +headerRight
      +'</div>'+rows+'</div>';
  }).join('');

  if(!blocos.replace(/\s/g,''))
    blocos = '<div class="empty">Nenhum dado para este mês.</div>';

  return '<div class="fs"><div class="fhdr"><button class="fbk" onclick="window.backOrClose()">&#8592; Voltar</button>'
    +'<div><div class="ftit">Gastos completos</div><div class="fsub">'+mLbl(m)+'</div></div></div>'
    +'<div class="notice">Teto = invariáveis + maior entre estimativa e real por categoria. Invariáveis entram direto; estimativas usam o valor real se já foi superado.</div>'
    +blocos
    +'<div class="card" style="display:flex;flex-direction:column;gap:6px;padding:14px 16px">'
      +'<div style="display:flex;justify-content:space-between"><span style="font-size:14px;color:var(--mt)">Gasto real</span><span style="font-family:monospace;font-size:14px;font-weight:700;color:var(--txt)">'+R(st.gastoReal)+'</span></div>'
      +'<div style="display:flex;justify-content:space-between"><span style="font-size:14px;font-weight:700">Teto comprometido</span><span style="font-family:monospace;font-size:15px;font-weight:700;color:var(--amb)">'+R(totalGeral)+'</span></div>'
    +'</div>'
    +'</div>';
}

function rParcelas(){
  var now=U.month;var months=[];
  for(var i=-3;i<=14;i++)months.push(shM(now,i));
  var carroInst=D.installments.filter(function(i){return i.group==='carro';});
  var cardInst=D.installments.filter(function(i){return i.group==='parcelas';});
  var activeCard=cardInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);});
  var totCard=activeCard.reduce(function(s,i){return s+i.amount;},0);
  var summary='<div class="dash-cards" style="margin-bottom:24px"><div class="sc"><div class="sl">Parcelas ativas (neste mês)</div><div class="sv" style="color:var(--pur)">'+R(totCard)+'</div><div class="ss">'+activeCard.length+' parcelas rolando</div></div><div class="sc"><div class="sl">Carro (neste mês)</div><div class="sv" style="color:var(--txt)">'+R(carroInst.filter(function(i){return i.start<=now&&(!i.end||i.end>=now);}).reduce(function(s,i){return s+i.amount;},0))+'</div><div class="ss">Financiamento + IPVA se houver</div></div></div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">'
      +'<button class="btn-import" onclick="window.openSimulator()">🧮 Simular nova parcela</button>'
      +'<button class="btn-import" onclick="window.openAddInst()">+ Adicionar parcela</button>'
      +'<button class="btn-import" onclick="window.openImport(\'installments\')">'+ICO.excel+' Importar parcelas</button>'
    +'</div>';
  
  function rGrp(label,list,gid){
    if(!list.length)return'';
    var g=gBy(gid);
    var abated=(D.instAbatimentos&&D.instAbatimentos[now])||[];
    var rows=list.map(function(inst){
      var tms=months.map(function(mm){
        var on=mm>=inst.start&&(!inst.end||mm<=inst.end);
        var isCur=mm===now;var isPast=mm<now&&on;
        if(!on)return'<div class="tm tm-off">'+mm.slice(5)+'</div>';
        var isAbat=isCur&&abated.indexOf(inst.id)>=0;
        var bg=isAbat?'#94a3b8':(g.color+(isPast?'66':'dd'));
        return'<div class="tm "'+(isCur?'tm-cur':isPast?'tm-past':'tm-fut')+'" style="background:'+bg+';border-color:'+bg+';'+(isAbat?'text-decoration:line-through;opacity:.7':'')+'">'+mm.slice(5)+'</div>';
      }).join('');
      var isActiveNow=inst.start<=now&&(!inst.end||inst.end>=now);
      var isAbatNow=abated.indexOf(inst.id)>=0;
      var abatBtn=isActiveNow
        ?'<button class="bs '+(isAbatNow?'bgrn':'be')+'" style="'+(isAbatNow?'background:var(--grn);color:#fff;border-color:var(--grn)':'')+'" onclick="window.toggleAbatimento(\''+inst.id+'\')">'+( isAbatNow?'&#10003; Abatido neste mês':'Abater este mês')+'</button>'
        :'';
      return'<div class="card tlrow" style="margin-bottom:0"><div class="tlhdr"><div><div class="tln">'+ibadge(g,26)+' '+inst.label+(isAbatNow?' <span style="font-size:10px;background:#dcfce7;color:var(--grn-d);padding:2px 7px;border-radius:6px;font-weight:700;margin-left:4px">abatido</span>':'')+' </div>'+(inst.notes?'<div class="tlnote">'+inst.notes+'</div>':'')+' </div><div class="tla" style="color:'+(isAbatNow?'var(--mt2)':g.color)+';'+(isAbatNow?'text-decoration:line-through':'')+' ">'+R(inst.amount)+'<span style="font-size:11px;font-weight:400;color:var(--mt)">/mês</span></div></div><div class="tlmonths">'+tms+'</div><div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px">'+abatBtn+'<button class="bs be" onclick="window.openInstEdit(\''+inst.id+'\')">Editar Detalhes</button></div></div>';
    }).join('');
    return'<div style="margin-bottom:32px"><div class="sec" style="margin-top:0;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:8px">'+ism(gid,g.color)+' <span style="font-size:13px">'+label+'</span></div><div class="cards-grid">'+rows+'</div></div>';
  }
  var body = rGrp('Carro',carroInst,'carro') + rGrp('Parcelas Cartão',cardInst,'parcelas');
  if(!carroInst.length && !cardInst.length){
    body = emptyStateCard('💳','Nenhuma parcela cadastrada','Cadastre compras parceladas, financiamentos ou cole dados de uma planilha para importar várias parcelas de uma vez.',
      '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn-import" onclick="window.openAddInst()">+ Adicionar manualmente</button><button class="btn-import" onclick="window.openImport(\'installments\')">'+ICO.excel+' Importar parcelas</button></div>');
  }
  return summary + body;
}

window.handleImportFile = async function(source) {
  var file = source.files ? source.files[0] : (source.dataTransfer ? source.dataTransfer.files[0] : null);
  if(!file) return;
  var lbl = document.getElementById('imp-file-lbl');
  if(lbl) lbl.textContent = '⏳ Processando: ' + file.name + '...';

  var ext = file.name.split('.').pop().toLowerCase();

  var processText = function(text) {
    var ta = document.getElementById('tsv-input');
    if(ta) ta.value = text;
    if(lbl) lbl.textContent = '✅ ' + file.name + ' carregado. Clique em Analisar.';
  };

  if(ext === 'csv' || ext === 'txt') {
    var reader = new FileReader();
    reader.onload = function(e) { processText(e.target.result); };
    // Try UTF-8 first, fall back to latin1 for Brazilian files
    reader.onerror = function() {
      var r2 = new FileReader();
      r2.onload = function(e) { processText(e.target.result); };
      r2.readAsText(file, 'ISO-8859-1');
    };
    reader.readAsText(file, 'UTF-8');
  } else if(ext === 'xlsx' || ext === 'xls') {
    try {
      var XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs');
      var reader2 = new FileReader();
      reader2.onload = function(e) {
        try {
          var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellText:false, cellDates:true});
          var ws = wb.Sheets[wb.SheetNames[0]];
          // Use sheet_to_json to get raw values (avoids locale formatting issues)
          var rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
          // Convert to TSV preserving raw numbers
          var tsv = rows.map(function(row){
            return row.map(function(cell){
              if(cell instanceof Date){
                var d=cell;
                return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
              }
              if(typeof cell === 'number') return String(cell);
              return String(cell||'');
            }).join('\t');
          }).filter(function(r){return r.trim();}).join('\n');
          processText(tsv);
        } catch(err) {
          if(lbl) lbl.textContent = '❌ Erro ao ler o arquivo: ' + err.message;
        }
      };
      reader2.readAsArrayBuffer(file);
    } catch(err) {
      if(lbl) lbl.textContent = '❌ Erro ao carregar leitor: ' + err.message;
    }
  } else {
    if(lbl) lbl.textContent = '❌ Formato não suportado. Use .xlsx, .csv ou .txt';
  }
};

  var n3 = parseFloat(clean);
  return isNaN(n3) ? 0 : Math.round(Math.abs(n3) * 100) / 100;
}

// ── Helpers de parcela ──────────────────────────────────────────────────────
function monthDiff(a, b) {
  var ap=a.split('-').map(Number), bp=b.split('-').map(Number);
  return (bp[0]-ap[0])*12 + (bp[1]-ap[1]);
}
function instParcelInfo(inst, m) {
  var cur, tot;
  var match = inst.notes && inst.notes.match(/Parcelas\s+(\d+)\s+a\s+(\d+)\/(\d+)/);
  if(match){
    tot = parseInt(match[3]);
    cur = parseInt(match[1]) + monthDiff(inst.start, m);
  } else if(inst.start && inst.end){
    tot = monthDiff(inst.start, inst.end) + 1;
    cur = monthDiff(inst.start, m) + 1;
  } else if(inst.start){
    cur = monthDiff(inst.start, m) + 1; tot = null;
  }
  return {cur: cur, tot: tot};
}

window.saveInvest=function(){
  var name=(document.getElementById('inv-name').value||'').trim();
  var amount=pn(document.getElementById('inv-amount').value);
  var typeEl=document.getElementById('inv-type');
  var type=typeEl?typeEl.value:'outro';
  var liqEl=document.querySelector('input[name="inv-liq"]:checked');
  var liquidity=liqEl?liqEl.value:'diaria';
  var startDate=(document.getElementById('inv-start')&&document.getElementById('inv-start').value)||tod();
  var dueDate=(document.getElementById('inv-due')&&document.getElementById('inv-due').value)||'';
  var notes=(document.getElementById('inv-notes')&&document.getElementById('inv-notes').value||'').trim();
  var t=invType(type);

  if(!name){ alert('Digite um nome para o investimento.'); return; }
  if(!amount||amount<=0){ alert('Digite o valor atual investido.'); return; }

  var item={id:U.investEd||uid(), name:name, type:type, amount:amount, startDate:startDate, dueDate:dueDate, liquidity:liquidity, notes:notes, yieldMode:'manual', rate:0, ratePeriod:'year'};

  if(t.rateMode==='cdi'){
    var cp=pn((document.getElementById('inv-cdipct')&&document.getElementById('inv-cdipct').value)||'100');
    if(!cp||cp<=0){ alert('Informe o % do CDI (ex: 110).'); return; }
    item.cdiPct=cp; item.rate=cp;
  } else if(t.rateMode==='selic'||t.rateMode==='poup'){
    item.yieldMode='auto'; item.rate=0;
  } else if(t.rateMode==='ipca'){
    var sp=pn((document.getElementById('inv-spread')&&document.getElementById('inv-spread').value)||'0');
    item.spread=sp; item.rate=sp;
  } else if(t.rateMode==='manual'){
    var ymEl2=document.getElementById('inv-yield');
    var ym3=ymEl2?ymEl2.value:'none';
    item.yieldMode=ym3;
    if(ym3!=='none'){
      var r2=pn((document.getElementById('inv-rate')&&document.getElementById('inv-rate').value)||'0');
      if(!r2){ alert('Informe a taxa ou selecione "Sem estimativa".'); return; }
      item.rate=r2;
      var rp2=document.getElementById('inv-rate-period');
      item.ratePeriod=rp2?rp2.value:'year';
    }
  } else {
    var r3=pn((document.getElementById('inv-rate')&&document.getElementById('inv-rate').value)||'0');
    if(!r3||r3<=0){ alert('Informe a taxa de rendimento.'); return; }
    item.rate=r3;
    var rp3=document.getElementById('inv-rate-period');
    item.ratePeriod=rp3?rp3.value:'year';
  }

  D.investments=Array.isArray(D.investments)?D.investments:[];
  var idx=D.investments.findIndex(function(x){return x.id===item.id;});
  if(idx>=0) D.investments[idx]=item; else D.investments.push(item);
  U.investEd=null; U.investDel=null; U.scr='main'; U.tab='invest';
  sset(D); render();
};

window.startQEMic = function(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert('Seu navegador não suporta reconhecimento de voz. Tente o Chrome ou Edge.');
    return;
  }
  var btn = document.getElementById('qe-mic-btn');
  var inp = document.getElementById('qei');
  if(!inp) return;

  // Se já estiver ouvindo, aborta
  if(window._qeMicActive){
    if(window._qeMicRec){ try{ window._qeMicRec.stop(); }catch(e){} }
    return;
  }

  // Toast de instrução
  var toast = document.createElement('div');
  toast.style.cssText='position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(15,23,42,.88);color:#fff;padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:500;white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;line-height:1.5;backdrop-filter:blur(8px)';
  toast.innerHTML = '🎤 Fale o gasto: <b>descrição, valor e dia</b><br><span style="font-weight:400;opacity:.8">Ex: "mercado oitenta e cinco hoje"</span>';
  document.body.appendChild(toast);

  var rec = new SR();
  rec.lang = 'pt-BR';
  rec.continuous = false;
  rec.interimResults = false;
  window._qeMicRec = rec;
  window._qeMicActive = true;
  if(btn) btn.classList.add('listening');

  rec.onresult = function(e){
    var txt = e.results[0][0].transcript;
    inp.value = txt;
    U.qe = txt;
    U.parsed = parseQEtxt(txt);
    if(btn){ btn.classList.remove('listening'); btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>'; }
    window._qeMicActive = false;
    toast.remove();
    render();
  };

  rec.onerror = function(e){
    if(btn){ btn.classList.remove('listening'); btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>'; }
    window._qeMicActive = false;
    toast.remove();
    if(e.error !== 'aborted'){
      var msgs = {
        'not-allowed': 'Permissão de microfone negada. Verifique as configurações do navegador.',
        'no-speech':   'Nenhuma fala detectada. Tente novamente.',
        'network':     'Erro de conexão. Verifique sua internet.'
      };
      alert(msgs[e.error] || 'Erro ao reconhecer voz: ' + e.error);
    }
  };

  rec.onend = function(){
    if(btn){ btn.classList.remove('listening'); }
    window._qeMicActive = false;
    setTimeout(function(){ try{ toast.remove(); }catch(x){} }, 500);
  };

// Navegação horizontal do menu mobile
// Em telas touch, deixamos o scroll nativo controlar o movimento para evitar
// disputa entre touchmove manual e scroll do navegador, que causava flickering.
// O arraste manual abaixo fica restrito ao mouse, útil em testes no desktop.
(function(){
  var el=null, isDragging=false, startX=0, startY=0, startScroll=0;
  var moved=false, pointerId=null, raf=0, nextScroll=0, suppressClickUntil=0;

  function nav(){ return document.getElementById('mbn-inner'); }
  function applyScroll(){ raf=0; if(el) el.scrollLeft=nextScroll; }

  document.addEventListener('pointerdown', function(e){
    var n = nav();
    if(!n || !n.contains(e.target) || e.pointerType !== 'mouse') return;
    el=n; isDragging=true; moved=false; pointerId=e.pointerId;
    startX=e.clientX; startY=e.clientY; startScroll=el.scrollLeft;
    el.classList.add('dragging');
    if(el.setPointerCapture) el.setPointerCapture(pointerId);
  });

  document.addEventListener('pointermove', function(e){
    if(!isDragging || !el || e.pointerId !== pointerId) return;
    var dx=e.clientX-startX;
    var dy=e.clientY-startY;
    if(Math.abs(dx) > 3 || Math.abs(dy) > 3) moved=true;
    if(Math.abs(dx) > 2) e.preventDefault();
    nextScroll=startScroll-dx;
    if(!raf) raf=requestAnimationFrame(applyScroll);
  }, {passive:false});

  function endDrag(e){
    if(!isDragging || !el) return;
    if(moved) suppressClickUntil=Date.now()+260;
    if(raf){ cancelAnimationFrame(raf); raf=0; }
    el.classList.remove('dragging');
    if(el.releasePointerCapture && e && e.pointerId === pointerId){
      try{ el.releasePointerCapture(pointerId); }catch(_e){}
    }
    el=null; isDragging=false; moved=false; pointerId=null;
  }

  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  document.addEventListener('click', function(e){
    var n = nav();
    if(n && n.contains(e.target) && Date.now() < suppressClickUntil){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    }
  }, true);
})();

window.niCalc=function(source){
  var st=document.getElementById('ni-st').value;
  var np=parseInt(document.getElementById('ni-np').value,10);
  var amEl=document.getElementById('ni-am');
  var totalEl=document.getElementById('ni-total');
  var am=parseFloat((amEl.value||'').replace(',','.'))||0;
  var total=parseFloat((totalEl&&totalEl.value||'').replace(',','.'))||0;
  var prev=document.getElementById('ni-prev');
  var enEl=document.getElementById('ni-en');
  if(source==='total' && total>0 && np>0){
    am=Math.round((total/np)*100)/100;
    amEl.value=am.toFixed(2);
  } else if(source==='monthly' && am>0 && np>0){
    if(totalEl) totalEl.value=(am*np).toFixed(2);
  } else if(total>0 && np>0 && (!am || source!=='monthly')){
    am=Math.round((total/np)*100)/100;
    amEl.value=am.toFixed(2);
  }
  if(st&&np>0){
    var d=new Date(st+'-02');
    d.setMonth(d.getMonth()+np-1);
    var end=d.toISOString().slice(0,7);
    enEl.value=end;
    if(am>0){
      var calcTotal=total>0?total:am*np;
      prev.style.display='block';
      prev.textContent=np+'x de '+R(am)+' · Total: '+R(calcTotal)+' · Término: '+end.split('-')[1]+'/'+end.split('-')[0];
    } else { prev.style.display='none'; }
  } else if(st&&enEl.value){
    var s=new Date(st+'-02'),e=new Date(enEl.value+'-02');
    var diff=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth())+1;
    document.getElementById('ni-np').value=diff>0?diff:'';
    if(total>0&&diff>0){am=Math.round((total/diff)*100)/100;amEl.value=am.toFixed(2);}
    if(am>0&&diff>0){prev.style.display='block';prev.textContent=diff+'x de '+R(am)+' · Total: '+R(total>0?total:am*diff);}
    else{prev.style.display='none';}
  } else { prev.style.display='none'; }
};

window.simCalc = function(){
  var el=document.getElementById('sim-result'); if(!el)return;
  var items=(window._simItems||[]).map(function(it){
    var total=parseFloat(String(it.total||'').replace(',','.'))||0;
    var n=parseInt(it.n,10)||0;
    var start=it.start;
    var juros=parseFloat(String(it.juros||'').replace(',','.'))||0;
    if(!total||!n||!start)return null;
    var parcela=juros>0 ? total*((juros/100)*Math.pow(1+juros/100,n))/(Math.pow(1+juros/100,n)-1) : total/n;
    return {total:total,n:n,start:start,juros:juros,parcela:parcela,totalPago:parcela*n};
  }).filter(Boolean);
  if(!items.length){ el.innerHTML=''; return; }
  var totalParc=items.reduce(function(s,i){return s+i.parcela;},0);
  var totalCompra=items.reduce(function(s,i){return s+i.total;},0);
  var maxN=Math.max.apply(null,items.map(function(i){return i.n;}));
  var rows='';
  for(var k=0;k<Math.min(maxN,12);k++){
    var byMonth={};
    items.forEach(function(it){
      for(var j=0;j<it.n;j++){
        var d=new Date(it.start+'-02'); d.setMonth(d.getMonth()+j);
        var mo=d.toISOString().slice(0,7); byMonth[mo]=(byMonth[mo]||0)+it.parcela;
      }
    });
    Object.keys(byMonth).sort().slice(0,12).forEach(function(mo){});
    break;
  }
  var months={};
  items.forEach(function(it){ for(var j=0;j<it.n;j++){ var d=new Date(it.start+'-02'); d.setMonth(d.getMonth()+j); var mo=d.toISOString().slice(0,7); months[mo]=(months[mo]||0)+it.parcela; } });
  rows=Object.keys(months).sort().slice(0,12).map(function(mo){
    var st=stats(mo); var novoTotal=st.committed+months[mo]; var sobra=st.sal-novoTotal; var over=sobra<0;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;gap:10px">'
      +'<span style="color:var(--mt)">'+new Date(mo+'-15').toLocaleDateString('pt-BR',{month:'short',year:'numeric'})+'</span>'
      +'<span style="font-family:monospace;font-weight:700;color:var(--pur)">+'+R(months[mo])+'</span>'
      +'<span style="font-family:monospace;font-weight:700;color:'+(over?'var(--red)':'var(--grn)')+'">sobra: '+R(sobra)+'</span>'
    +'</div>';
  }).join('');
  var more=Object.keys(months).length>12?'<div style="font-size:12px;color:var(--mt);padding:8px 0 0">... e mais '+(Object.keys(months).length-12)+' meses</div>':'';
  el.innerHTML='<div style="background:var(--s2);border-radius:12px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--mt)">Total das compras</span><span style="font-family:monospace;font-size:15px;font-weight:800;color:var(--txt)">'+R(totalCompra)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--mt)">Soma das parcelas mensais</span><span style="font-family:monospace;font-size:18px;font-weight:800;color:var(--pur)">'+R(totalParc)+'</span></div>'
    +'<div style="font-size:11px;color:var(--mt2);margin-top:6px">A soma mensal varia conforme cada compra começa e termina.</div></div>'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--mt);text-transform:uppercase;margin-bottom:6px">Impacto mês a mês</div>'+rows+more;
};

window.openOnboarding = function(){
  if(document.getElementById('ob-overlay')) return;
  window._obStep = 0;
  window._renderOb();
};

window._renderOb = function(){
  var step = OB_STEPS[window._obStep];
  var total = OB_STEPS.length;
  var isLast = window._obStep === total-1;

  var listHtml = step.list.length
    ? '<ul class="ob-steps-list" style="list-style:none">'+step.list.map(function(l){
        return '<li><span>'+l.ico+'</span><span style="color:var(--txt);font-size:13px;line-height:1.5">'+l.text+'</span></li>';
      }).join('')+'</ul>'
    : '';

  var dots = OB_STEPS.map(function(_,i){
    return '<div class="ob-dot'+(i===window._obStep?' on':'')+'"></div>';
  }).join('');

  var innerHTML = '<div class="ob-icon">'+step.icon+'</div>'
    +'<div class="ob-title">'+step.title+'</div>'
    +'<div class="ob-desc">'+step.desc+'</div>'
    +listHtml
    +'<div class="ob-dots" style="margin-top:20px">'+dots+'</div>';

  var footerHTML = (window._obStep > 0
    ? '<button class="ob-btn-skip" onclick="window.obBack()">← Voltar</button>'
    : '<button class="ob-btn-skip" onclick="window.obDone()">Pular</button>')
    +'<button class="ob-btn-next" onclick="'+(isLast?'window.obDone()':'window.obNext()')+'">'
      +(isLast?'Começar agora 🎉':'Próximo →')
    +'</button>';

  var existing = document.getElementById('ob-overlay');
  if(existing) {
    // Update in-place: no remove+add, no flash
    var stepEl = existing.querySelector('.ob-step');
    var footEl = existing.querySelector('.ob-footer');
    if(stepEl) {
      stepEl.style.opacity = '0';
      stepEl.style.transform = 'translateX(20px)';
      stepEl.style.transition = 'opacity 0.12s ease, transform 0.12s ease';
      setTimeout(function(){
        stepEl.innerHTML = innerHTML;
        if(footEl) footEl.innerHTML = footerHTML;
        stepEl.style.opacity = '1';
        stepEl.style.transform = 'translateX(0)';
      }, 120);
    }
    return;
  }

  // First render: create the overlay
  var html = '<div class="ob-overlay" id="ob-overlay">'
    +'<div class="ob-modal">'
      +'<button class="ob-close" onclick="window.obDone()" aria-label="Fechar guia" title="Fechar">&times;</button>'
      +'<div class="ob-step active" style="padding:32px 28px 8px;transition:opacity 0.12s ease,transform 0.12s ease">'+innerHTML+'</div>'
      +'<div class="ob-footer">'+footerHTML+'</div>'
    +'</div>'
  +'</div>';

  var el = document.createElement('div');
  el.innerHTML = html;
  document.body.appendChild(el.firstChild);
};

window.obNext = function(){
  if(window._obStep < OB_STEPS.length-1){
    window._obStep++;
    window._renderOb();
  }
};

window.obBack = function(){
  if(window._obStep > 0){
    window._obStep--;
    window._renderOb();
  }
};

window.obDone = function(){
  var el = document.getElementById('ob-overlay');
  if(el){ el.style.animation='overlayFadeIn 0.2s ease reverse'; setTimeout(function(){ el.remove(); },200); }
  if(D){ D.onboarded = true; sset(D); }
};

window.changePassword=function(){
  var p1 = document.getElementById('cfg-pwd').value;
  var p2 = document.getElementById('cfg-pwd-conf').value;
  if(!p1 || p1.length < 6){ U.secMsg={ok:false,txt:'A senha deve ter pelo menos 6 caracteres.'}; render(); return; }
  if(p1 !== p2){ U.secMsg={ok:false,txt:'As senhas não coincidem. Tente novamente.'}; render(); return; }
  
  var user=auth.currentUser;
  if(!user){U.secMsg={ok:false,txt:'Usuário não encontrado.'};render();return;}
  import('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js').then(function(m){
    m.updatePassword(user,p1).then(function(){
      U.secMsg={ok:true,txt:'Senha atualizada com sucesso!'};render();
    }).catch(function(e){
      var msg=e.code==='auth/requires-recent-login'?'Por segurança, faça login novamente para alterar sua senha.':'Erro ao alterar: '+e.message;
      U.secMsg={ok:false,txt:msg};render();
    });
  });
};

window.exportCSV=function(){
  var rows=['Data,Descricao,Categoria,Valor'];
  var exps=D.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  exps.forEach(function(e){
    var g=gBy(e.group);
    var desc=(e.description||g.label).replace(/,/g,' ');
    rows.push(e.date+','+desc+','+g.label+','+e.amount.toFixed(2).replace('.',','));
  });
  var csv=rows.join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='gastos-'+mM()+'.csv';document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},100);
};

<script>
// Drag-to-scroll para elementos com overflow horizontal no desktop
(function(){
  var SEL = '.chips, .tlmonths, .tabs, .stats-bar-wrap, .tbl-wrap, .cal-wrap';
  var dragging = false, el = null, startX = 0, scrollLeft = 0, moved = false;

  // Elementos interativos: clique deve funcionar normalmente
  var INTERACTIVE = ['INPUT','SELECT','TEXTAREA','BUTTON','A','LABEL'];

  function attach(node){
    if(node._dragScroll) return;
    node._dragScroll = true;
    node.addEventListener('mousedown', function(e){
      if(e.button !== 0) return;
      // Não intercepta cliques em elementos interativos dentro do container
      var t = e.target;
      while(t && t !== node) {
        if(INTERACTIVE.indexOf(t.tagName) >= 0) return;
        t = t.parentElement;
      }
      dragging = true; el = node; moved = false;
      startX = e.pageX - node.offsetLeft;
      scrollLeft = node.scrollLeft;
    });
  }

  document.addEventListener('mousemove', function(e){
    if(!dragging || !el) return;
    var x = e.pageX - el.offsetLeft;
    var dx = Math.abs(x - startX);
    if(dx > 4) {
      moved = true;
      el.style.cursor = 'grabbing';
      el.style.userSelect = 'none';
      el.scrollLeft = scrollLeft - (x - startX);
    }
  });

  document.addEventListener('mouseup', function(){
    if(!el) return;
    el.style.cursor = '';
    el.style.userSelect = '';
    dragging = false; el = null; moved = false;
  });

  document.addEventListener('mouseleave', function(){
    if(!el) return;
    el.style.cursor = '';
    el.style.userSelect = '';
    dragging = false; el = null; moved = false;
  });

  // Observa mudanças no DOM e aplica a novos elementos
  var observer = new MutationObserver(function(){
    document.querySelectorAll(SEL).forEach(attach);
  });
  observer.observe(document.body, { childList: true, subtree: true });
  document.querySelectorAll(SEL).forEach(attach);
})();
</script>
